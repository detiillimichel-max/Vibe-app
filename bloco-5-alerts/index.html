<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="alerts-container">
        <div class="alerts-header">Notificações</div>
        
        <div class="notification-list">
            <div class="notif-item unread">
                <div class="notif-icon">🔔</div>
                <div class="notif-content">
                    Você tem uma nova interação no seu perfil. Clique para ver.
                    <span class="notif-time">Agora mesmo</span>
                </div>
            </div>

            <div class="notif-item">
                <div class="notif-icon">🚀</div>
                <div class="notif-content">
                    O sistema <b>OIO ONE</b> está atualizado e pronto para uso.
                    <span class="notif-time">Há 30 minutos</span>
                </div>
            </div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
