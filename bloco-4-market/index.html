<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="market-container">
        <div class="market-header">
            <div class="market-title">Marketplace</div>
            <div style="color: #1877f2; font-size: 14px; font-weight: 500;">Criar anúncio</div>
        </div>

        <div class="product-grid">
            <div class="product-card">
                <div class="product-image">📱</div>
                <div class="product-info">
                    <div class="product-price">R$ 2.500</div>
                    <div class="product-name">iPhone 13 Pro Max</div>
                    <div class="product-location">São Paulo, SP</div>
                    <button class="btn-buy">Ver Detalhes</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">🎮</div>
                <div class="product-info">
                    <div class="product-price">R$ 3.800</div>
                    <div class="product-name">PlayStation 5 + 2 Controles</div>
                    <div class="product-location">Rio de Janeiro, RJ</div>
                    <button class="btn-buy">Ver Detalhes</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">💻</div>
                <div class="product-info">
                    <div class="product-price">R$ 4.200</div>
                    <div class="product-name">MacBook Air M1 Lacrado</div>
                    <div class="product-location">Curitiba, PR</div>
                    <button class="btn-buy">Ver Detalhes</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">👟</div>
                <div class="product-info">
                    <div class="product-price">R$ 450</div>
                    <div class="product-name">Tênis Nike Jordan Limited</div>
                    <div class="product-location">Belo Horizonte, MG</div>
                    <button class="btn-buy">Ver Detalhes</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
