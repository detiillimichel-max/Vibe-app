<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OIO ONE | UNIVERSO</title>
    
    <link rel="stylesheet" href="styles/dna.css">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/premium_clean.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <script type="module" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"></script>

    <style>
        #portal-layer.hidden, #app-layer.hidden { display: none !important; }
        #universe-display { flex: 1; overflow-y: auto; background: #000; padding-bottom: 100px; }
        header { height: 60px; background: #1877f2; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 100; }
        .quantum-nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body>

    <div id="portal-layer">
        <div class="login-box">
            <h1 class="portal-label">OIO ONE</h1>
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-pass" placeholder="Senha">
            <button id="btn-entrar" class="glass-btn">ACESSAR UNIVERSO</button>
        </div>
    </div>

    <div id="app-layer" class="hidden">
        <header>
            <span style="font-weight:900; font-size:20px; letter-spacing:-1px;">OIO ONE</span>
            <div style="width:38px; height:38px; border-radius:50%; background:#fff; overflow:hidden; border:2px solid rgba(255,255,255,0.2);">
                <img id="user-avatar-top" src="" style="width:100%; height:100%; object-fit:cover;">
            </div>
        </header>
        <main id="universe-display"></main>
        <nav class="quantum-nav">
            <div class="nav-item active" data-module="origin"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item" data-module="watch"><i class="fa-solid fa-play"></i></div>
            <div class="nav-item" data-module="friends"><i class="fa-solid fa-comment"></i></div>
            <div class="nav-item" data-module="marketplace"><i class="fa-solid fa-bag-shopping"></i></div>
            <div class="nav-item" data-module="notifications"><i class="fa-solid fa-bell"></i></div>
            <div class="nav-item" data-module="profile"><i class="fa-solid fa-bars"></i></div>
        </nav>
    </div>

    <script type="module">
        // Importamos tudo de uma vez para garantir a ordem
        import { Logger } from './js/services/Logger.js';
        import { OriginController } from './js/modules/origin/controller.js';
        
        // Garante que o sistema de som e navegação carreguem ANTES do init
        const loadScript = (src) => {
            return new Promise((resolve) => {
                const s = document.createElement('script');
                s.src = src;
                s.onload = resolve;
                document.body.appendChild(s);
            });
        };

        async function startApp() {
            await loadScript('js/core.js');
            await loadScript('js/quantum.js');
            
            // Injeta o Controller na memória global para o app-init.js
            window.OriginController = OriginController;
            
            // Chama o seu inicializador da pasta core
            import('./js/core/app-init.js').then(() => {
                Logger.info("OIO ONE: Online e Operacional.");
            });
        }

        startApp();
    </script>
</body>
</html>
