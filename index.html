<!-- GAVETA 3: CHAT REAL COM FIREBASE -->
<main id="gaveta-3" class="gaveta">
    <div id="chat-container" style="display: flex; flex-direction: column; height: 100%;">
        <!-- Área onde as mensagens vão aparecer -->
        <div id="messages" style="flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px;">
            <p style="text-align: center; color: var(--text-muted); font-size: 12px;">Conectando ao Firebase...</p>
        </div>

        <!-- Campo de digitação fixo embaixo -->
        <div style="padding: 15px; border-top: 1px solid var(--border-color); display: flex; gap: 10px; background: var(--bg-color);">
            <input type="text" id="chatInput" class="main-input" placeholder="Digite sua mensagem...">
            <button class="btn-post" onclick="enviarMensagem()">ENVIAR</button>
        </div>
    </div>
</main>

<!-- SCRIPTS DO FIREBASE (Colocar antes do fechamento do </body>) -->
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

<script>
  // COLE SUAS CONFIGURAÇÕES DO FIREBASE AQUI
  const firebaseConfig = {
    apiKey: "SUA_API_KEY",
    authDomain: "SEU_PROJETO.firebaseapp.com",
    projectId: "SEU_PROJETO_ID",
    storageBucket: "SEU_PROJETO.appspot.com",
    messagingSenderId: "SEU_SENDER_ID",
    appId: "SEU_APP_ID"
  };

  // Inicializa o Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // Função para enviar mensagem
  function enviarMensagem() {
    const texto = document.getElementById('chatInput').value;
    if (texto.trim() !== "") {
        db.collection("chats").add({
            nome: "Michel Detilli",
            mensagem: texto,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('chatInput').value = "";
    }
  }

  // Função para "escutar" o banco em tempo real
  db.collection("chats").orderBy("timestamp", "asc")
    .onSnapshot((snapshot) => {
        const msgDiv = document.getElementById('messages');
        msgDiv.innerHTML = ""; // Limpa para atualizar
        snapshot.forEach((doc) => {
            const data = doc.data();
            const align = data.nome === "Michel Detilli" ? "flex-end" : "flex-start";
            const color = data.nome === "Michel Detilli" ? "#333" : "#1a1a1a";
            
            msgDiv.innerHTML += `
                <div style="align-self: ${align}; background: ${color}; padding: 10px; border-radius: 12px; max-width: 80%;">
                    <small style="color: #888; display: block; font-size: 10px;">${data.nome}</small>
                    <span>${data.mensagem}</span>
                </div>
            `;
        });
        msgDiv.scrollTop = msgDiv.scrollHeight; // Rola para o fim
    });
</script>
