<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* CSS MESTRE - ESTRUTURA DO HUB */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000; overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
        }

        /* Área onde os blocos aparecem */
        #app-viewport {
            width: 100%;
            height: calc(100% - 70px); /* Desconta a barra de baixo */
            border: none;
        }

        /* Barra de Navegação Inferior (Estilo Facebook/Instagram) */
        .tab-bar {
            position: fixed;
            bottom: 0; width: 100%;
            height: 70px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 999;
        }

        .tab-item {
            color: #888;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
            display: flex; flex-direction: column; align-items: center;
        }

        .tab-item.active { color: #1877f2; }
        .tab-label { font-size: 10px; margin-top: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <iframe id="app-viewport" src="bloco-1-home/index.html"></iframe>

    <nav class="tab-bar">
        <div class="tab-item active" onclick="loadBlock('bloco-1-home', this)">🏠<span class="tab-label">Home</span></div>
        <div class="tab-item" onclick="loadBlock('bloco-2-watch', this)">📺<span class="tab-label">Watch</span></div>
        <div class="tab-item" onclick="loadBlock('bloco-3-friends', this)">👥<span class="tab-label">Amigos</span></div>
        <div class="tab-item" onclick="loadBlock('bloco-4-market', this)">🛍️<span class="tab-label">Market</span></div>
        <div class="tab-item" onclick="loadBlock('bloco-5-alerts', this)">🔔<span class="tab-label">Alertas</span></div>
        <div class="tab-item" onclick="loadBlock('bloco-6-menu', this)">👤<span class="tab-label">Perfil</span></div>
    </nav>

    <script>
        // Lógica de Troca de Blocos
        function loadBlock(folder, element) {
            // 1. Muda o SRC do Iframe
            document.getElementById('app-viewport').src = folder + '/index.html';
            
            // 2. Atualiza o visual dos ícones
            document.querySelectorAll('.tab-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            
            console.log("Navegando para: " + folder);
        }

        // Registrar Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
