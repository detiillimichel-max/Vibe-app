<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE | VIBE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; height: 100%; overflow: hidden; }
        .hidden { display: none !important; }
        
        /* TELA DE LOGIN */
        #portal-layer { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; padding: 20px; text-align: center; }
        .oio-logo { color: #1877f2; font-size: 50px; font-weight: 900; margin-bottom: 30px; letter-spacing: -2px; }
        input { width: 100%; max-width: 300px; background: #1c1e21; border: 1px solid #333; padding: 15px; border-radius: 12px; color: white; margin-bottom: 12px; outline: none; font-size: 16px; }
        .login-btn { width: 100%; max-width: 300px; background: #1877f2; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* ESTRUTURA DO APP (SÓ APARECE APÓS LOGIN) */
        .main-nav { position: fixed; top: 0; width: 100%; background: #080808; display: flex; padding: 12px 0; border-bottom: 1px solid #1a1a1a; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: #555; font-size: 22px; cursor: pointer; }
        .nav-item.active { color: #1877f2; }
        #view-container { margin-top: 65px; height: calc(100vh - 65px); overflow-y: auto; padding: 15px; }
    </style>
</head>
<body>

    <div id="portal-layer">
        <div class="oio-logo">OIO</div>
        <input type="text" id="user-name" placeholder="Seu nome">
        <input type="tel" id="user-pass" placeholder="Senha numérica" maxlength="6">
        <button onclick="tentarAcesso()" class="login-btn">ACESSAR UNIVERSO</button>
        <p id="error-msg" class="hidden" style="color: #ff3040; margin-top: 10px;">Senha incorreta!</p>
    </div>

    <div id="app-layer" class="hidden">
        <nav class="main-nav">
            <div class="nav-item active" onclick="carregarBloco(1, this)"><i class="fas fa-home"></i></div>
            <div class="nav-item" onclick="carregarBloco(2, this)"><i class="fas fa-play-circle"></i></div>
            <div class="nav-item" onclick="carregarBloco(3, this)"><i class="fas fa-user-circle"></i></div>
            <div class="nav-item" onclick="carregarBloco(4, this)"><i class="fas fa-store"></i></div>
            <div class="nav-item" onclick="carregarBloco(5, this)"><i class="fas fa-bell"></i></div>
            <div class="nav-item" onclick="carregarBloco(6, this)"><div style="width:20px; height:20px; background:#1877f2; border-radius:50%; margin:auto;"></div></div>
        </nav>
        <div id="view-container"></div>
    </div>

    <script>
        // FUNÇÃO DE LOGIN
        function tentarAcesso() {
            const pass = document.getElementById('user-pass').value;
            const error = document.getElementById('error-msg');
            
            // Coloque aqui a senha que você deseja (ex: 123456)
            if(pass === "123456") { 
                document.getElementById('portal-layer').classList.add('hidden');
                document.getElementById('app-layer').classList.remove('hidden');
                carregarBloco(1); // Entra na Home
            } else {
                error.classList.remove('hidden');
            }
        }

        // CARREGADOR DE MÓDULOS (PASTA /modulos)
        async function carregarBloco(num, el) {
            if(el) {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
            const container = document.getElementById('view-container');
            container.innerHTML = "<p>Sincronizando...</p>";
            
            try {
                // Ele vai buscar o arquivo dentro da pasta 'modulos'
                const response = await fetch(`modulos/bloco${num}.html`);
                if(response.ok) {
                    const html = await response.text();
                    container.innerHTML = html;
                } else {
                    container.innerHTML = `<div style="padding:20px; text-align:center;">
                        <h3>Módulo ${num} em construção</h3>
                        <p>Crie o arquivo modulos/bloco${num}.html</p>
                    </div>`;
                }
            } catch (e) {
                container.innerHTML = "Erro ao conectar com o módulo.";
            }
        }
    </script>
</body>
</html>
