<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OIO ONE</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* CSS MESTRE - ESTRUTURA DO HUB PREMIUM */
        :root {
            --bg-color: #000000;
            --bar-bg: rgba(10, 10, 10, 0.85);
            --text-primary: #FFFFFF;
            --text-secondary: #888888;
            --accent: #1877f2; /* Azul OIO */
            --border: rgba(255, 255, 255, 0.08);
            --tab-height: 75px;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg-color);
            overflow: hidden;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Container Principal do App (Iframe isolado) */
        #app-viewport {
            width: 100%;
            height: calc(100% - var(--tab-height));
            border: none;
            display: block;
        }

        /* 💎 BARRA DE NAVEGAÇÃO PREMIUM (Glassmorphism) */
        .tab-bar {
            position: fixed;
            bottom: 0; width: 100%;
            height: var(--tab-height);
            background: var(--bar-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--border);
            z-index: 9999;
            padding-bottom: env(safe-area-inset-bottom); /* Suporte para notch */
        }

        /* Item da Tab */
        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s ease, transform 0.2s ease;
            position: relative;
        }

        /* Efeito de Clique */
        .tab-item:active {
            transform: scale(0.95);
        }

        /* Ícone Ativo */
        .tab-item.active {
            color: var(--accent);
        }

        /* Estilo dos Ícones SVG */
        .tab-icon {
            width: 26px;
            height: 26px;
            fill: currentColor; /* Usa a cor do .tab-item */
            margin-bottom: 5px;
            transition: fill 0.3s ease;
        }

        /* Marcador Visual Superior (Opcional, dá um toque de luxo) */
        .tab-item.active::before {
            content: '';
            position: absolute;
            top: 0;
            width: 30px;
            height: 3px;
            background-color: var(--accent);
            border-radius: 0 0 3px 3px;
            box-shadow: 0 2px 10px rgba(24, 119, 242, 0.5);
        }

        /* Legenda do Ícone */
        .tab-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

    </style>
</head>
<body>

    <iframe id="app-viewport" src="bloco-1-home/index.html"></iframe>

    <nav class="tab-bar">
        
        <a class="tab-item active" onclick="loadBlock('bloco-1-home', this)">
            <svg class="tab-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="tab-label">Home</span>
        </a>

        <a class="tab-item" onclick="loadBlock('bloco-2-watch', this)">
            <svg class="tab-icon" viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 12l-4-4 1.41-1.41L12 12.17l2.59-2.58L16 11l-4 4z"/></svg>
            <span class="tab-label">Watch</span>
        </a>

        <a class="tab-item" onclick="loadBlock('bloco-3-friends', this)">
            <svg class="tab-icon" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            <span class="tab-label">Amigos</span>
        </a>

        <a class="tab-item" onclick="loadBlock('bloco-4-market', this)">
            <svg class="tab-icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.89 2 1.99 2H20c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-1 14H5V8h14v10zm-1-7h-2v2h2v-2zm-4 0h-2v2h2v-2zm-4 0H7v2h2v-2z"/></svg>
            <span class="tab-label">Market</span>
        </a>

        <a class="tab-item" onclick="loadBlock('bloco-5-alerts', this)">
            <svg class="tab-icon" viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
            <span class="tab-label">Alertas</span>
        </a>

        <a class="tab-item" onclick="loadBlock('bloco-6-menu', this)">
            <svg class="tab-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
            <span class="tab-label">Perfil</span>
        </a>

    </nav>

    <script>
        // Lógica de Troca de Blocos
        function loadBlock(folder, element) {
            // 1. Muda o SRC do Iframe para carregar o bloco correspondente
            document.getElementById('app-viewport').src = folder + '/index.html';
            
            // 2. Atualiza o visual dos ícones (remove active de todos, adiciona no clicado)
            document.querySelectorAll('.tab-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            
            console.log("Navegando para: " + folder);
        }

        // Registrar Service Worker para PWA (Transformar em App)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
