<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE | SISTEMA DE IDENTIDADE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #1877f2;
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.12);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body, html { background: var(--bg); color: white; height: 100%; overflow: hidden; }
        .hidden { display: none !important; }

        /* --- TELA DE ACESSO --- */
        #portal-layer { 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%); 
        }
        .login-card { 
            background: var(--glass); backdrop-filter: blur(40px); padding: 40px 25px; 
            border-radius: 35px; border: 1px solid var(--border); width: 90%; max-width: 380px; text-align: center;
        }
        .logo { font-size: 70px; font-weight: 900; color: var(--primary); margin-bottom: 20px; letter-spacing: -5px; }
        
        .field { margin-bottom: 20px; text-align: left; }
        .field label { font-size: 11px; color: #888; margin-left: 10px; text-transform: uppercase; font-weight: bold; }
        .field input { 
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--border); 
            padding: 20px; border-radius: 20px; color: white; font-size: 16px; margin-top: 8px; outline: none;
        }

        .btn { 
            width: 100%; padding: 20px; border-radius: 20px; border: none; background: var(--primary); 
            color: white; font-weight: 900; font-size: 16px; cursor: pointer; margin-top: 10px;
        }
        .btn-sec { background: transparent; border: 1px solid var(--border); margin-top: 15px; font-size: 13px; color: #aaa; }

        /* --- APP CORE --- */
        .header { height: 75px; display: flex; align-items: center; justify-content: space-around; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: fixed; top: 0; width: 100%; z-index: 1000; }
        .nav-link { font-size: 24px; color: #444; }
        .nav-link.active { color: var(--primary); }
        #main { margin-top: 75px; height: calc(100vh - 75px); overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 30px; padding: 20px; margin-bottom: 20px; }
        
        /* Chat */
        #chat-flow { height: 350px; overflow-y: auto; display: flex; flex-direction: column; margin-bottom: 15px; }
        .bbl { max-width: 80%; padding: 12px 18px; border-radius: 20px; margin-bottom: 8px; font-size: 14px; }
        .bbl.me { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; }
        .bbl.other { background: #262626; align-self: flex-start; border-bottom-left-radius: 4px; }
        .u-tag { font-size: 9px; font-weight: bold; margin-bottom: 3px; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="portal-layer">
        <div class="login-card" id="card-auth">
            <div class="logo">OIO</div>
            <h2 id="auth-title" style="margin-bottom:20px; font-size: 18px;">Entrar no Universo</h2>
            
            <div class="field">
                <label>Nome de Usuário</label>
                <input type="text" id="user-name" placeholder="Ex: Michel">
            </div>
            <div class="field">
                <label>PIN de Acesso</label>
                <input type="password" id="user-pin" placeholder="Sua senha" maxlength="8">
            </div>

            <button class="btn" onclick="handleAuth()" id="btn-main">CONECTAR</button>
            <button class="btn btn-sec" onclick="toggleMode()" id="btn-toggle">Não tem conta? Criar agora</button>
            
            <p id="msg" style="margin-top:15px; font-size:12px; color: #ff3b30;" class="hidden"></p>
        </div>
    </div>

    <div id="app-layer" class="hidden">
        <div class="header">
            <div class="nav-link active" onclick="nav(1, this)"><i class="fas fa-home"></i></div>
            <div class="nav-link" onclick="nav(2, this)"><i class="fas fa-play-circle"></i></div>
            <div class="nav-link" onclick="nav(3, this)"><i class="fas fa-comment-dots"></i></div>
            <div class="nav-link" onclick="nav(6, this)"><i class="fas fa-th-large"></i></div>
        </div>
        <div id="main"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://uqdwtzlkqaosnweyoyit.supabase.co';
        const SB_KEY = 'sb_publishable_uafBQD1aJ3w8_eq4meOsNQ_wzk8TwhA';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        let currentUser = "";
        let isLoginMode = true;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Entrar no Universo" : "Criar Nova Identidade";
            document.getElementById('btn-main').innerText = isLoginMode ? "CONECTAR" : "CADASTRAR E ENTRAR";
            document.getElementById('btn-toggle').innerText = isLoginMode ? "Não tem conta? Criar agora" : "Já tenho conta. Entrar";
        }

        async function handleAuth() {
            const user = document.getElementById('user-name').value.trim();
            const pin = document.getElementById('user-pin').value.trim();
            const msg = document.getElementById('msg');

            if(user.length < 3 || pin.length < 4) {
                msg.innerText = "Nome (min 3) e PIN (min 4) são necessários.";
                msg.classList.remove('hidden');
                return;
            }

            if(isLoginMode) {
                // Tenta logar
                const { data, error } = await supabase.from('usuarios').select('*').eq('nome', user).eq('senha', pin).single();
                if(data) {
                    enterApp(user);
                } else {
                    msg.innerText = "Usuário ou PIN incorretos.";
                    msg.classList.remove('hidden');
                }
            } else {
                // Tenta cadastrar
                const { error } = await supabase.from('usuarios').insert([{ nome: user, senha: pin }]);
                if(!error) {
                    enterApp(user);
                } else {
                    msg.innerText = "Este nome já está em uso.";
                    msg.classList.remove('hidden');
                }
            }
        }

        function enterApp(name) {
            currentUser = name;
            document.getElementById('portal-layer').classList.add('hidden');
            document.getElementById('app-layer').classList.remove('hidden');
            nav(3);
        }

        async function nav(p, el) {
            if(el) { document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active')); el.classList.add('active'); }
            const root = document.getElementById('main');
            
            if(p === 3) {
                root.innerHTML = `
                    <div class="card">
                        <h3>Chat Profissional</h3>
                        <div id="chat-flow"></div>
                        <div style="display:flex; gap:10px">
                            <input id="m-in" placeholder="Mensagem..." style="flex:1; background:rgba(255,255,255,0.05); border:1px solid var(--border); padding:15px; border-radius:15px; color:white;">
                            <button class="btn" style="width:60px; margin:0" onclick="send()"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>`;
                sync();
                setInterval(sync, 3000);
            } else {
                root.innerHTML = `<div class="card"><h2>Módulo ${p}</h2><p>Identidade: ${currentUser}</p></div>`;
            }
        }

        async function sync() {
            const { data } = await supabase.from('mensagens').select('*').order('created_at', {ascending: true});
            const flow = document.getElementById('chat-flow');
            if(data && flow) {
                flow.innerHTML = data.map(m => `
                    <div class="bbl ${m.usuario === currentUser ? 'me' : 'other'}">
                        <div class="u-tag">${m.usuario}</div>
                        ${m.texto}
                    </div>`).join('');
                flow.scrollTop = flow.scrollHeight;
            }
        }

        async function send() {
            const i = document.getElementById('m-in');
            if(!i.value) return;
            await supabase.from('mensagens').insert([{ texto: i.value, usuario: currentUser }]);
            i.value = "";
            sync();
        }
    </script>
</body>
</html>
