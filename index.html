<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OIO ONE | Vibe App</title>
    
    <link rel="stylesheet" href="styles/dna.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="oio-portal">
        <div class="login-card">
            <h1 class="brand-title">OIO ONE</h1>
            <input type="text" id="id-name" class="input-oio" placeholder="Seu Nome">
            <input type="password" id="id-pin" class="input-oio" placeholder="PIN de 4 dígitos">
            <button class="btn-entrar" onclick="initCore()">ENTRAR NO UNIVERSO</button>
        </div>
    </div>

    <div id="oio-os" style="display:none;">
        <header class="top-bar">
            <span id="display-user-name">Michel Detilli</span>
            <div class="user-avatar-circle"></div>
        </header>

        <main id="app-canvas">
            </main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="route(1, this)"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item" onclick="route(2, this)"><i class="fa-solid fa-play"></i></div>
            <div class="nav-item" onclick="route(3, this)"><i class="fa-solid fa-comment"></i></div>
            <div class="nav-item" onclick="route(4, this)"><i class="fa-solid fa-bag-shopping"></i></div>
            <div class="nav-item" onclick="route(5, this)"><i class="fa-solid fa-bell"></i></div>
            <div class="nav-item" onclick="route(6, this)"><i class="fa-solid fa-bars"></i></div>
        </nav>
    </div>

    <script src="js/core.js"></script>
    <script src="js/quantum.js"></script>

</body>
</html>
