<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OIO ONE | GovTech</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen" class="full-screen">
        <div class="login-card">
            <h2>OIO ONE</h2>
            <input type="email" id="email" placeholder="Email institucional">
            <input type="password" id="pass" placeholder="Senha">
            <button onclick="login()">Entrar no Sistema</button>
        </div>
    </div>

    <div id="main-portal" style="display:none;">
        <header class="main-header">
            <div class="user-info">
                <div class="avatar" id="user-avatar"></div>
                <span id="user-name">Carregando...</span>
            </div>
            <i class="fa-solid fa-gear"></i>
        </header>

        <main class="vibe-nav-grid">
            <button class="nav-btn" onclick="navegar('home')">Home</button>
            <button class="nav-btn" onclick="navegar('market')">Market</button>
            </main>
    </div>

    <div id="app-view"></div>

    <script src="js/core.js"></script>
</body>
</html>
