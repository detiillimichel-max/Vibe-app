<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Resgate</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #00050a; }
        .balao { padding: 10px; border-radius: 12px; max-width: 80%; background: #222; align-self: flex-start; }
        .balao.minha { align-self: flex-end; background: #0066ff; }
        .balao img { max-width: 100%; border-radius: 8px; }
        .controles { display: flex; padding: 10px; background: #111; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #222; color: #fff; }
        button { background: #0066ff; color: #fff; border: none; border-radius: 20px; padding: 0 20px; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div class="controles">
        <input type="file" id="f" accept="image/*" style="display:none" onchange="subir(this)">
        <button onclick="document.getElementById('f').click()">📸</button>
        <input id="i" placeholder="Vibe...">
        <button onclick="env()">OK</button>
    </div>
    <script>
        const config = { databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database().ref("vibe_final_resgate");
        let nick = prompt("Nome:") || "Michel";

        db.limitToLast(15).on("child_added", s => {
            const d = s.val();
            const div = document.createElement("div");
            div.className = "balao " + (d.u === nick ? "minha" : "");
            div.innerHTML = `<b>${d.u}</b><br>${d.img ? `<img src="${d.img}">` : d.t}`;
            document.getElementById("chat").appendChild(div);
            document.getElementById("chat").scrollTop = 9999;
        });

        function env() {
            const v = document.getElementById("i").value;
            if(v) { db.push({ u: nick, t: v }); document.getElementById("i").value = ""; }
        }

        function subir(input) {
            if (input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => db.push({ u: nick, img: e.target.result });
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
