<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Chat Firebase</title>

<style>
/* === CSS === */
body { font-family: sans-serif; background: #f2f2f2; }
.login-container, .chat-container {
  width: 400px; margin: 20px auto; padding: 20px;
  background: #fff; border-radius: 10px; box-shadow: 0 0 10px #ccc;
}
input { width: 95%; padding: 8px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; }
button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; background: #4CAF50; color: #fff; font-weight: bold; cursor: pointer; }
.mensagem { border-bottom: 1px solid #ddd; padding: 5px; margin-bottom:5px; }
.mensagem img, .mensagem video { max-width: 100%; display:block; margin-top: 5px; border-radius: 5px; }
.nome { font-weight: bold; }
.share { cursor:pointer; color:#2196F3; margin-left:10px; }
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>

</head>
<body>

<div class="login-container" id="login">
  <h2>Login / Cadastro</h2>
  <input type="text" id="nome" placeholder="Seu nome">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">
  <button id="btnCadastrar">Cadastrar</button>
  <button id="btnLogin">Entrar</button>
  <p id="msg"></p>
</div>

<div class="chat-container" id="chat" style="display:none;">
  <h2>Chat</h2>
  <div id="mensagens"></div>
  <input type="text" id="textoMsg" placeholder="Digite sua mensagem">
  <input type="file" id="fotoMsg" accept="image/*,video/*">
  <button id="btnEnviar">Enviar</button>
</div>

<script>
// === JS ===
// Config Firebase - substitua pelos seus dados
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  databaseURL: "https://SEU_PROJETO.firebaseio.com",
  projectId: "SEU_PROJETO",
  storageBucket: "SEU_PROJETO.appspot.com",
  messagingSenderId: "SEU_MESSAGING_ID",
  appId: "SEU_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

const loginDiv = document.getElementById("login");
const chatDiv = document.getElementById("chat");
const nomeInput = document.getElementById("nome");
const emailInput = document.getElementById("email");
const senhaInput = document.getElementById("senha");
const btnCadastrar = document.getElementById("btnCadastrar");
const btnLogin = document.getElementById("btnLogin");
const msgP = document.getElementById("msg");

const textoMsg = document.getElementById("textoMsg");
const fotoMsg = document.getElementById("fotoMsg");
const btnEnviar = document.getElementById("btnEnviar");
const mensagensDiv = document.getElementById("mensagens");

let nomeUsuario = "";

// Cadastro
btnCadastrar.addEventListener("click", ()=>{
  const email = emailInput.value;
  const senha = senhaInput.value;
  nomeUsuario = nomeInput.value;

  auth.createUserWithEmailAndPassword(email, senha)
  .then(userCredential=>{
    msgP.style.color="green";
    msgP.textContent="Cadastro feito!";
    loginDiv.style.display="none";
    chatDiv.style.display="block";
  })
  .catch(err=>{
    msgP.style.color="red";
    msgP.textContent=err.message;
  });
});

// Login
btnLogin.addEventListener("click", ()=>{
  const email = emailInput.value;
  const senha = senhaInput.value;
  nomeUsuario = nomeInput.value;

  auth.signInWithEmailAndPassword(email, senha)
  .then(user=>{
    msgP.style.color="green";
    msgP.textContent="Logado!";
    loginDiv.style.display="none";
    chatDiv.style.display="block";
  })
  .catch(err=>{
    msgP.style.color="red";
    msgP.textContent=err.message;
  });
});

// Enviar mensagem
btnEnviar.addEventListener("click", async ()=>{
  const texto = textoMsg.value;
  const file = fotoMsg.files[0];

  let mediaUrl = "";
  let tipo = "";
  if(file){
    const ref = storage.ref('midia/' + Date.now() + "_" + file.name);
    await ref.put(file);
    mediaUrl = await ref.getDownloadURL();
    tipo = file.type.startsWith("video") ? "video" : "image";
  }

  const novaMsg = {
    nome: nomeUsuario,
    texto: texto,
    media: mediaUrl,
    tipo: tipo,
    timestamp: Date.now(),
    likes: 0
  };

  db.ref('mensagens').push(novaMsg);
  textoMsg.value="";
  fotoMsg.value="";
});

// Mostrar mensagens em tempo real
db.ref('mensagens').on('value', snapshot=>{
  mensagensDiv.innerHTML="";
  snapshot.forEach(child=>{
    const data = child.val();
    const div = document.createElement("div");
    div.classList.add("mensagem");
    
    let mediaHTML = "";
    if(data.tipo === "image") mediaHTML = `<img src="${data.media}" />`;
    else if(data.tipo === "video") mediaHTML = `<video controls src="${data.media}"></video>`;

    div.innerHTML = `
      <span class="nome">${data.nome}</span>: ${data.texto}
      ${mediaHTML}
      <span class="share" onclick="navigator.clipboard.writeText('${data.texto}')">📤 Compartilhar</span>
      <span class="share" style="margin-left:20px; cursor:pointer;" onclick="likeMessage('${child.key}', ${data.likes})">❤️ ${data.likes}</span>
    `;
    mensagensDiv.appendChild(div);
  });
});

function likeMessage(id, currentLikes){
  db.ref('mensagens/' + id).update({ likes: currentLikes + 1 });
}
</script>

</body>
</html>
