<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vibe App - Michel Detilli</title>
    <style>
        :root { 
            --bg-color: #000000; --card-color: #121212; --text-main: #FFFFFF; 
            --text-muted: #888888; --border-color: #222222; --accent: #007bff;
        }
        
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; background: var(--bg-color); color: var(--text-main); 
            font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh;
        }

        /* BARRA SUPERIOR */
        header { 
            display: flex; justify-content: space-around; align-items: center;
            padding: 10px 0; border-bottom: 1px solid var(--border-color); 
            height: 60px; background: var(--bg-color);
        }

        .icon { width: 26px; height: 26px; fill: var(--text-muted); cursor: pointer; transition: 0.3s; }
        .icon.active { fill: var(--text-main); }

        /* ÁREA DE CONTEÚDO */
        .gaveta { display: none; height: calc(100vh - 60px); overflow-y: auto; animation: fadeIn 0.3s; }
        .gaveta.ativa { display: flex; flex-direction: column; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* VISUAL DO CHAT (IGUAL SUA IMAGEM 1) */
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg-container { display: flex; flex-direction: column; max-width: 80%; }
        .msg-me { align-self: flex-end; align-items: flex-end; }
        .msg-them { align-self: flex-start; align-items: flex-start; }

        .bubble { 
            padding: 12px 16px; border-radius: 20px; font-size: 15px; 
            background: var(--card-color); border: 1px solid var(--border-color);
        }
        .msg-me .bubble { background: #0056b3; border: none; }

        .user-label { font-size: 11px; color: var(--accent); margin-bottom: 4px; font-weight: bold; }

        /* BARRA DE ENTRADA */
        .chat-input-bar { 
            padding: 15px; border-top: 1px solid var(--border-color); 
            display: flex; align-items: center; gap: 12px; background: var(--bg-color);
        }

        .chat-input-bar input { 
            flex: 1; background: #1a1a1a; border: none; padding: 12px 20px; 
            border-radius: 25px; color: white; outline: none;
        }

        .btn-action { background: none; border: none; cursor: pointer; padding: 5px; }
        .btn-action svg { fill: var(--accent); width: 24px; height: 24px; }

        /* VÍDEO */
        .video-full { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <header>
        <svg class="icon active" onclick="abrirGaveta('gaveta-1', this)" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <svg class="icon" onclick="abrirGaveta('gaveta-2', this)" viewBox="0 0 24 24"><path d="M10 16.5l6-4.5-6-4.5v9zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
        <svg class="icon" onclick="abrirGaveta('gaveta-3', this)" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
        <svg class="icon" onclick="abrirGaveta('gaveta-6', this)" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </header>

    <!-- GAVETA 1: HOME -->
    <main id="gaveta-1" class="gaveta ativa" style="padding: 20px;">
        <h2 style="margin-top:0">Olá, Michel</h2>
        <div style="background:#121212; padding:20px; border-radius:15px; border:1px solid #222">
            <p>Seu app orgânico está online. Explore as gavetas abaixo.</p>
        </div>
    </main>

    <!-- GAVETA 2: VÍDEO -->
    <main id="gaveta-2" class="gaveta">
        <video id="meuVideo" class="video-full" loop playsinline onclick="this.paused ? this.play() : this.pause()">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        </video>
    </main>

    <!-- GAVETA 3: CHAT (VIBE STYLE) -->
    <main id="gaveta-3" class="gaveta">
        <div id="messages">
            <!-- Mensagem Exemplo -->
            <div class="msg-container msg-them">
                <span class="user-label">detilliimichel</span>
                <div class="bubble">Olá! Testando o novo visual.</div>
            </div>
        </div>
        
        <div class="chat-input-bar">
            <button class="btn-action"><svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg></button>
            <input type="text" id="chatInput" placeholder="Sua vibe...">
            <button class="btn-action" onclick="enviar()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
        </div>
    </main>

    <!-- GAVETA 6: PERFIL -->
    <main id="gaveta-6" class="gaveta" style="padding: 40px 20px; text-align: center;">
        <div style="width: 100px; height: 100px; background: #333; border-radius: 50%; margin: 0 auto 20px;"></div>
        <h2 style="margin:0">Michel Detilli</h2>
        <p style="color: var(--text-muted)">Bom Jesus dos Perdões, SP</p>
    </main>

    <!-- FIREBASE CONEXÃO -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AlzaSyAWL1XRR8JK-J5Qk5DSIKmBl4ZYMZw1R4I",
            authDomain: "vibe-app-bbba2.firebaseapp.com",
            projectId: "vibe-app-bbba2",
            storageBucket: "vibe-app-bbba2.appspot.com",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function abrirGaveta(id, el) {
            document.querySelectorAll('.gaveta').forEach(g => g.classList.remove('ativa'));
            document.querySelectorAll('.icon').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('ativa');
            el.classList.add('active');
            if(id !== 'gaveta-2') document.getElementById('meuVideo').pause();
        }

        function enviar() {
            const input = document.getElementById('chatInput');
            if (input.value.trim()) {
                db.collection("mensagens").add({
                    texto: input.value,
                    usuario: "Michel",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                input.value = "";
            }
        }

        db.collection("mensagens").orderBy("timestamp", "asc").onSnapshot(snap => {
            const box = document.getElementById('messages');
            box.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                const isMe = m.usuario === "Michel";
                box.innerHTML += `
                    <div class="msg-container ${isMe ? 'msg-me' : 'msg-them'}">
                        <span class="user-label">${isMe ? 'você' : 'detilliimichel'}</span>
                        <div class="bubble">${m.texto}</div>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
