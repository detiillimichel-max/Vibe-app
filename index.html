<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE | SOCIAL ENGINE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent: #1877f2;
            --bg: #000000;
            --card: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.1);
            --text-gray: #b0b3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Helvetica, Arial, sans-serif; height: 100%; overflow: hidden; }
        .hidden { display: none !important; }

        /* --- PORTAL DE ACESSO (LOGIN PREMIUM) --- */
        #portal-layer { 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); 
        }
        .login-card { 
            background: var(--card); backdrop-filter: blur(30px); padding: 45px 30px; 
            border-radius: 35px; border: 1px solid var(--border); width: 90%; max-width: 380px; text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }
        .oio-logo { font-size: 75px; font-weight: 900; letter-spacing: -5px; color: var(--accent); margin-bottom: 20px; text-shadow: 0 0 20px rgba(24,119,242,0.4); }
        
        .field { width: 100%; margin-bottom: 20px; }
        .field label { display: block; text-align: left; font-size: 11px; color: var(--text-gray); margin-bottom: 8px; margin-left: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .field input { 
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); 
            padding: 20px; border-radius: 18px; color: white; outline: none; font-size: 16px; transition: 0.3s;
        }
        .field input:focus { border-color: var(--accent); background: rgba(24,119,242,0.05); }

        .btn-main { 
            width: 100%; padding: 20px; border-radius: 18px; border: none; background: var(--accent); 
            color: white; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 25px rgba(24,119,242,0.3);
        }
        .btn-main:active { transform: scale(0.96); }

        /* --- ESTRUTURA CORE DO APP --- */
        #app-core { height: 100vh; display: flex; flex-direction: column; }
        
        .header-nav { 
            height: 75px; display: flex; align-items: center; justify-content: space-around; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); 
            border-bottom: 1px solid var(--border); position: fixed; top: 0; width: 100%; z-index: 1000;
        }
        .nav-tab { font-size: 26px; color: #444; position: relative; transition: 0.3s; padding: 10px; }
        .nav-tab.active { color: var(--accent); }
        .nav-tab.active::after { content: ''; position: absolute; bottom: 0; left: 20%; right: 20%; height: 3px; background: var(--accent); border-radius: 10px; }

        #viewport { flex: 1; margin-top: 75px; overflow-y: auto; padding: 15px; padding-bottom: 100px; }

        /* --- COMPONENTES --- */
        .glass-block { background: var(--card); border: 1px solid var(--border); border-radius: 25px; padding: 20px; margin-bottom: 15px; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Chat Profissional */
        #chat-engine { height: 400px; overflow-y: auto; display: flex; flex-direction: column; padding-bottom: 15px; }
        .msg { max-width: 82%; padding: 14px 18px; border-radius: 22px; margin-bottom: 12px; font-size: 14px; position: relative; }
        .msg.me { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.other { background: #262626; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-meta { font-size: 10px; font-weight: bold; margin-bottom: 5px; display: block; opacity: 0.6; }

        /* Grid Facebook Style */
        .fb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .fb-item { 
            background: var(--card); height: 130px; border-radius: 22px; border: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s;
        }
        .fb-item i { font-size: 30px; color: var(--accent); margin-bottom: 12px; }
        .fb-item span { font-size: 12px; font-weight: 600; color: #fff; }

        video { width: 100%; border-radius: 20px; border: 1px solid var(--border); background: #000; margin-top: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <section id="portal-layer">
        <div class="login-card">
            <div class="oio-logo">OIO</div>
            <div class="field">
                <label>Identificação do Usuário</label>
                <input type="text" id="user-name" placeholder="Como você se chama?">
            </div>
            <div class="field">
                <label>PIN de Segurança</label>
                <input type="tel" id="user-pin" placeholder="Senha de 4 dígitos" maxlength="4">
            </div>
            <button class="btn-main" onclick="openOio()">CONECTAR AO FEED</button>
            <p id="err" class="hidden" style="color: #ff4b4b; margin-top: 15px; font-size: 12px;">Dados incorretos. Tente novamente.</p>
        </div>
    </section>

    <main id="app-core" class="hidden">
        <header class="header-nav">
            <div class="nav-tab active" onclick="go(1, this)"><i class="fas fa-home"></i></div>
            <div class="nav-tab" onclick="go(2, this)"><i class="fas fa-play-circle"></i></div>
            <div class="nav-tab" onclick="go(3, this)"><i class="fas fa-comment-dots"></i></div>
            <div class="nav-tab" onclick="go(4, this)"><i class="fas fa-shopping-bag"></i></div>
            <div class="nav-tab" onclick="go(6, this)"><i class="fas fa-th-large"></i></div>
        </header>

        <section id="viewport"></section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supUrl = 'https://uqdwtzlkqaosnweyoyit.supabase.co';
        const supKey = 'sb_publishable_uafBQD1aJ3w8_eq4meOsNQ_wzk8TwhA';
        const supabase = window.supabase.createClient(supUrl, supKey);

        let myIdentity = "";

        function openOio() {
            const n = document.getElementById('user-name').value;
            const p = document.getElementById('user-pin').value;
            if(n.length > 2 && p === "2024") { 
                myIdentity = n;
                document.getElementById('portal-layer').classList.add('hidden');
                document.getElementById('app-core').classList.remove('hidden');
                go(3); // Abre direto no chat para comunicação imediata
            } else {
                document.getElementById('err').classList.remove('hidden');
            }
        }

        async function go(page, el) {
            if(el) { document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active')); el.classList.add('active'); }
            const stage = document.getElementById('viewport');
            
            if(page === 1) {
                stage.innerHTML = `<div class="glass-block"><h2>Universo OIO</h2><p style="color:var(--text-gray)">Olá, ${myIdentity}. Você está conectado.</p></div>`;
            }
            else if(page === 2) {
                stage.innerHTML = `<div class="glass-block"><h3>Vibe Reels</h3><div id="v-list">Sincronizando vídeos globais...</div></div>`;
                const { data } = await supabase.from('posts_video').select('*').order('created_at', {ascending: false});
                if(data) document.getElementById('v-list').innerHTML = data.map(v => `<video src="${v.url}" controls></video>`).join('');
            }
            else if(page === 3) {
                stage.innerHTML = `
                    <div class="glass-block">
                        <h3>Mensagens</h3>
                        <div id="chat-engine"></div>
                        <div style="display:flex; gap:10px; margin-top:10px">
                            <input id="m-val" placeholder="Sua mensagem..." style="background:rgba(255,255,255,0.05); border:1px solid var(--border); padding:15px; border-radius:15px; color:white; flex:1; outline:none">
                            <button class="btn-main" style="width:65px; border-radius:15px" onclick="send()"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                    <div class="glass-block">
                        <h3>Meu Perfil Profissional</h3>
                        <div class="field"><label>Cidade</label><input id="p-cid" value="Bragança Paulista"></div>
                        <div class="field"><label>Ocupação</label><input id="p-job" value="Application Developer"></div>
                        <button class="btn-main" onclick="alert('Perfil salvo na nuvem!')">ATUALIZAR DADOS</button>
                    </div>`;
                updateChat();
                setInterval(updateChat, 3000); // Polling profissional
            }
            else if(page === 4) {
                stage.innerHTML = `<div class="glass-block"><h3>Marketingplace</h3><p>Anúncios e produtos da sua região.</p></div>`;
            }
            else if(page === 6) {
                stage.innerHTML = `
                    <div class="fb-grid">
                        <div class="fb-item"><i class="fas fa-bookmark"></i><span>SALVOS</span></div>
                        <div class="fb-item"><i class="fas fa-users"></i><span>GRUPOS</span></div>
                        <div class="fb-item"><i class="fas fa-star"></i><span>RECOMENDADO</span></div>
                        <div class="fb-item"><i class="fas fa-history"></i><span>RECORDAÇÕES</span></div>
                        <div class="fb-item"><i class="fas fa-cog"></i><span>CONFIGURAÇÕES</span></div>
                        <div class="fb-item" style="border-color:#ff4b4b" onclick="location.reload()"><i class="fas fa-power-off" style="color:#ff4b4b"></i><span>SAIR</span></div>
                    </div>`;
            }
        }

        async function updateChat() {
            const { data } = await supabase.from('mensagens').select('*').order('created_at', {ascending: true});
            const box = document.getElementById('chat-engine');
            if(data && box) {
                box.innerHTML = data.map(m => `
                    <div class="msg ${m.usuario === myIdentity ? 'me' : 'other'}">
                        <span class="msg-meta">${m.usuario}</span>
                        ${m.texto}
                    </div>`).join('');
                box.scrollTop = box.scrollHeight;
            }
        }

        async function send() {
            const inp = document.getElementById('m-val');
            if(!inp.value) return;
            await supabase.from('mensagens').insert([{ texto: inp.value, usuario: myIdentity }]);
            inp.value = "";
            updateChat();
        }
    </script>
</body>
</html>
