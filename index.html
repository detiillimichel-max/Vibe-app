<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vibe App</title>
    <style>
        :root { --bg: #000; --card: #111; --text: #fff; --acc: #007AFF; --gray: #222; --muted: #888; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* BARRA DE ÍCONES (TOP) */
        header { 
            display: flex; justify-content: space-around; align-items: center; 
            height: 65px; border-bottom: 1px solid var(--gray); background: rgba(0,0,0,0.9);
            padding-top: env(safe-area-inset-top); z-index: 10;
        }
        .icon { width: 24px; height: 24px; fill: var(--muted); cursor: pointer; transition: 0.3s; }
        .icon.active { fill: var(--text); transform: scale(1.1); }

        /* ÁREA DE TELAS */
        main { flex: 1; position: relative; overflow: hidden; }
        .page { display: none; height: 100%; width: 100%; flex-direction: column; animation: fadeIn 0.4s ease; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* DESIGN DO CHAT */
        #chat-view { background: #000; }
        #msg-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .balao { padding: 12px 18px; border-radius: 22px; max-width: 80%; font-size: 15px; line-height: 1.4; }
        .eu { align-self: flex-end; background: var(--acc); color: white; border-bottom-right-radius: 4px; }
        .outro { align-self: flex-start; background: var(--gray); border-bottom-left-radius: 4px; }

        /* INPUT FIXO */
        .input-box { 
            padding: 12px 16px; background: #000; border-top: 1px solid var(--gray);
            display: flex; align-items: center; gap: 10px;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }
        .input-box input { 
            flex: 1; background: #1a1a1a; border: none; padding: 12px 20px; 
            border-radius: 25px; color: #fff; font-size: 16px; outline: none;
        }
        .btn-send { color: var(--acc); font-weight: bold; background: none; border: none; font-size: 14px; }

        /* OUTRAS TELAS */
        .centered { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .card { background: var(--card); border: 1px solid var(--gray); padding: 20px; border-radius: 15px; margin-top: 20px; width: 100%; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<header>
    <svg class="icon active" onclick="tab(0,this)" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <svg class="icon" onclick="tab(1,this)" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
    <svg class="icon" onclick="tab(2,this)" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    <svg class="icon" onclick="tab(3,this)" viewBox="0 0 24 24"><path d="M19 6h-2c0-2.76-2.24-5-5-5S7 3.24 7 6H5c-1.1 0-1.99.9-1.99 2L3 20c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2l-1-12c0-1.1-.9-2-2-2z"/></svg>
    <svg class="icon" onclick="tab(4,this)" viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
    <svg class="icon" onclick="tab(5,this)" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
</header>

<main>
    <section class="page active centered"><h2>Feed</h2><div class="card">Acompanhe as vibrações.</div></section>
    
    <section class="page"><video id="vid" loop playsinline><source src="https://www.w3schools.com/html/mov_bbb.mp4"></video></section>
    
    <section class="page" id="chat-view">
        <div id="msg-container"></div>
        <div class="input-box">
            <input type="text" id="txt" placeholder="Diga algo...">
            <button class="btn-send" onclick="send()">ENVIAR</button>
        </div>
    </section>

    <section class="page centered"><h2>Shop</h2><div class="card">Produtos em breve.</div></section>
    <section class="page centered"><h2>Avisos</h2><p>Sem notificações.</p></section>
    <section class="page centered"><h2>Perfil</h2><div class="card">Configurações da conta.</div></section>
</main>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AlzaSyAWL1XRR8JK-J5Qk5DSIKmBl4ZYMZw1R4I",
        authDomain: "vibe-app-bbba2.firebaseapp.com",
        projectId: "vibe-app-bbba2",
        storageBucket: "vibe-app-bbba2.appspot.com",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function tab(i, el) {
        document.querySelectorAll('.page').forEach((p,idx)=> p.classList.toggle('active', idx === i));
        document.querySelectorAll('.icon').forEach(ico => ico.classList.remove('active'));
        el.classList.add('active');
        const v = document.getElementById('vid');
        i === 1 ? v.play() : v.pause();
    }

    function send() {
        const t = document.getElementById('txt');
        if(t.value.trim()){
            db.collection("vibe_chat").add({
                msg: t.value,
                user: "A",
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
            t.value = "";
        }
    }

    db.collection("vibe_chat").orderBy("time","asc").onSnapshot(s => {
        const c = document.getElementById('msg-container');
        c.innerHTML = "";
        s.forEach(d => {
            const m = d.data();
            const me = m.user === "A";
            c.innerHTML += `<div class="balao ${me?'eu':'outro'}">${m.msg}</div>`;
        });
        c.scrollTop = c.scrollHeight;
    });
</script>
</body>
</html>
