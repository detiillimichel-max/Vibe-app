<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>App Orgânico</title>
    <style>
        /* O DNA do Visual - Dark Mode Profissional */
        :root { 
            --bg-color: #000000; /* Fundo preto puro para AMOLED */
            --card-color: #121212; /* Cinza bem escuro para os cards */
            --text-main: #FFFFFF; /* Texto principal em branco */
            --text-muted: #888888; /* Texto secundário em cinza */
            --border-color: #222222; /* Bordas sutis */
        }

        body { 
            margin: 0; 
            padding: 0; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }

        /* Barra de Navegação Superior */
        header { 
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            padding: 15px 0; 
            border-bottom: 1px solid var(--border-color); 
            position: sticky; 
            top: 0; 
            background: var(--bg-color); 
            z-index: 10; 
        }

        .icon { 
            width: 24px; 
            height: 24px; 
            fill: var(--text-muted); /* Ícones inativos em cinza */
            transition: fill 0.3s;
        }

        .icon.active { 
            fill: var(--text-main); /* Ícone ativo (Casa) em branco brilhante */
        }

        /* Área Principal da Gaveta 1 */
        main { 
            padding: 20px; 
        }

        /* O Campo de Intenção (Fica no topo) */
        .input-area { 
            margin-bottom: 30px; 
        }

        .input-area input { 
            width: 100%; 
            background: var(--card-color); 
            border: 1px solid var(--border-color); 
            color: var(--text-main); 
            padding: 16px; 
            border-radius: 12px; 
            font-size: 16px; 
            box-sizing: border-box; 
            outline: none; 
            transition: border-color 0.3s;
        }

        .input-area input:focus { 
            border-color: #555555; /* Acende levemente ao digitar */
        }

        /* O Feed de Intenções (As mensagens dos outros) */
        .feed { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        .card { 
            background: var(--card-color); 
            padding: 18px; 
            border-radius: 12px; 
            border: 1px solid transparent;
        }

        .card-text { 
            font-size: 16px; 
            margin: 0 0 8px 0; 
            line-height: 1.4; 
            font-weight: 500;
        }

        .card-meta { 
            font-size: 13px; 
            color: var(--text-muted); 
            margin: 0; 
        }
    </style>
</head>
<body>

    <!-- BARRA SUPERIOR (Gaveta 1 Ativa) -->
    <header>
        <!-- Ícone 1: Casa/Mural (ATIVO) -->
        <svg class="icon active" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <!-- Ícone 2: Vídeos -->
        <svg class="icon" viewBox="0 0 24 24"><path d="M10 16.5l6-4.5-6-4.5v9zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
        <!-- Ícone 3: Conversas -->
        <svg class="icon" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        <!-- Ícone 4: Marketplace -->
        <svg class="icon" viewBox="0 0 24 24"><path d="M19 6h-2c0-2.76-2.24-5-5-5S7 3.24 7 6H5c-1.1 0-1.99.9-1.99 2L3 20c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2l-1-12c0-1.1-.9-2-2-2zm-7-3c1.66 0 3 1.34 3 3H9c0-1.66 1.34-3 3-3zm0 10c-2.76 0-5-2.24-5-5h2c0 1.66 1.34 3 3 3s3-1.34 3-3h2c0 2.76-2.24 5-5 5z"/></svg>
        <!-- Ícone 5: Sino -->
        <svg class="icon" viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/></svg>
        <!-- Ícone 6: Perfil -->
        <svg class="icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </header>

    <!-- CONTEÚDO DA GAVETA 1 -->
    <main>
        <!-- Campo para o usuário digitar a intenção -->
        <div class="input-area">
            <input type="text" placeholder="O que você busca ou oferece agora?">
        </div>

        <!-- O Feed de Intenções (Sem avatares, direto ao ponto) -->
        <div class="feed">
            <div class="card">
                <p class="card-text">Preciso de um frete para o centro de Bom Jesus dos Perdões amanhã cedo.</p>
                <p class="card-meta">Agora mesmo</p>
            </div>
            
            <div class="card">
                <p class="card-text">Alguém sabe se o posto de saúde já abriu?</p>
                <p class="card-meta">Há 5 min</p>
            </div>
            
            <div class="card">
                <p class="card-text">Ofereço carona para SP todos os dias às 7h.</p>
                <p class="card-meta">Há 12 min</p>
            </div>
            
            <div class="card">
                <p class="card-text">Procurando um fogão 4 bocas usado em bom estado para comprar.</p>
                <p class="card-meta">Há 1h</p>
            </div>
        </div>
    </main>

</body>
</html>
