<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE | Sistema Orgânico</title>
    <link rel="stylesheet" href="./styles/dna.css">
</head>
<body class="bg-black">

    <div id="portal-layer">
        <div class="login-box">
            <h2 class="portal-label">OIO ONE</h2>
            <input type="text" id="user-email" placeholder="IDENTIDADE" autocomplete="off">
            <input type="password" id="user-pass" placeholder="CÓDIGO">
            <button id="btn-entrar" class="glass-btn">ENTRAR</button>
        </div>
    </div>

    <main id="app-layer" class="hidden">
        
        <nav class="quantum-nav glass-nav">
            <button class="nav-item active" onclick="switchUniverse('home')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9.5L12 3L21 9.5V20C21 20.5523 20.5523 21 20 21H4C3.44772 21 3 20.5523 3 20V9.5Z"/><path d="M9 21V12H15V21"/></svg>
            </button>
            <button class="nav-item" onclick="switchUniverse('reels')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M10 9L15 12L10 15V9Z"/></svg>
            </button>
            <button class="nav-item" onclick="switchUniverse('friends')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21V19C17 16.7909 15.2091 15 13 15H5C2.79086 15 1 16.7909 1 19V21"/><circle cx="9" cy="7" r="4"/></svg>
            </button>
            <button class="nav-item" onclick="switchUniverse('market')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 6H21L19 20H5L3 6Z"/><path d="M8 6V4C8 2.89543 8.89543 2 10 2H14C15.1046 2 16 2.89543 16 4V6"/></svg>
            </button>
            <button class="nav-item" onclick="switchUniverse('notify')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8C18 4.68629 15.3137 2 12 2C8.68629 2 6 4.68629 6 8C6 14 3 16 3 16H21C21 16 18 14 18 8Z"/><path d="M10.3 21C10.7 21.6 11.3 22 12 22"/></svg>
            </button>
            <button class="nav-item" onclick="switchUniverse('profile')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 12C14.2091 12 16 10.2091 16 8C16 5.79086 14.2091 4 12 4"/><path d="M12 12C9.79086 12 8 13.7909 8 16C8 18.2091 9.79086 20 12 20"/></svg>
            </button>
        </nav>

        <section id="main-content" class="content-depth">
            <div id="universe-display">
                <video muted loop playsinline id="main-video">
                    <source src="https://archive.org/download/steamboat-willie-1928/SteamboatWillie1928.mp4" type="video/mp4">
                </video>
            </div>
        </section>

        <nav class="floating-icons">
            <button class="icon-btn" id="btn-hub">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/></svg>
            </button>
        </nav>
    </main>

    <div id="hub-layer" class="hub-hidden">
        <div class="hub-content">
            <h1 id="user-display-name" class="user-name">...</h1>
            <div class="vitrine-grid" id="vitrine-main"></div>
            <button class="close-hub">VOLTAR</button>
        </div>
    </div>

    <script src="./js/core.js"></script>
    <script src="./js/quantum.js"></script>
</body>
</html>
