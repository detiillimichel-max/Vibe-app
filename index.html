<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OIO ONE</title>
    <link rel="stylesheet" href="styles/dna.css">
    <link rel="stylesheet" href="styles/global.css">
    <style>
        .hidden { display: none !important; }
        #portal-layer { height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; }
        .login-box { text-align: center; width: 80%; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; }
        button { width: 100%; padding: 15px; background: #1877f2; color: white; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="portal-layer">
        <div class="login-box">
            <h1 style="color:white; margin-bottom:20px;">OIO ONE</h1>
            <input type="text" id="login-user" placeholder="Seu Nome">
            <input type="password" id="login-pass" placeholder="Senha (ex: 9927)">
            <button id="btn-entrar">ACESSAR UNIVERSO</button>
        </div>
    </div>

    <div id="app-layer" class="hidden">
        <h2 style="color:white; text-align:center; margin-top:50px;">BEM-VINDO AO UNIVERSO</h2>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/core.js"></script>
</body>
</html>
