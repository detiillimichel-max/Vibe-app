<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIBE - OIO ONE</title>
    
    <!-- CAMINHOS BASEADOS NA IMAGEM 2 -->
    <link rel="stylesheet" href="./styles/global.css">
    <link rel="stylesheet" href="./styles/dna.css">
    <link rel="stylesheet" href="./styles/premium_clean.css">
</head>
<body class="dark-theme">

    <div id="portal-layer">
        <div class="vibe-container">
            <h1 class="vibe-logo">VIBE</h1>
            <div class="login-box">
                <input type="email" id="user-email" placeholder="ID de Acesso" class="vibe-input">
                <input type="password" id="user-pass" placeholder="Senha" class="vibe-input">
                <!-- Injeção direta de função para não depender de arquivo externo travar -->
                <button id="btn-entrar" class="glass-btn" onclick="document.getElementById('portal-layer').style.display='none'; document.getElementById('app-layer').style.display='block';">ACESSAR</button>
            </div>
        </div>
    </div>

    <div id="app-layer" style="display:none;">
        <main id="universe-display">
            <div style="color:white; text-align:center; margin-top:50vh;">CONECTADO AO UNIVERSO</div>
        </main>
    </div>

    <!-- CAMINHOS BASEADOS NA IMAGEM 1 -->
    <script type="module" src="./js/core.js"></script>
    <script type="module" src="./js/quantum.js"></script>
</body>
</html>
