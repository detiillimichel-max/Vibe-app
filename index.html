<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Pro Master</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }
        
        /* TELA DE IDENTIDADE (SUA URL/NOME AQUI) */
        #tela-identidade { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; background: radial-gradient(circle at top, #001a33, #000); 
            transition: 0.5s;
        }
        .avatar-box { width: 120px; height: 120px; border-radius: 50%; border: 2px solid #0066ff; margin-bottom: 20px; overflow: hidden; background: #111; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .input-vibe { background: #111; border: 1px solid #0044cc; color: #fff; padding: 15px; border-radius: 30px; width: 80%; max-width: 320px; text-align: center; font-size: 16px; outline: none; margin-bottom: 15px; }
        .btn-acesso { background: #0066ff; color: #fff; border: none; padding: 15px 60px; border-radius: 30px; font-weight: bold; cursor: pointer; }

        /* TELA DE CHAT (OCULTA ATÉ O ACESSO) */
        #tela-chat { display: none; flex-direction: column; height: 100vh; background: #000; }
        #mensagens { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .balao { padding: 12px; border-radius: 18px; max-width: 80%; background: rgba(0, 153, 255, 0.15); align-self: flex-start; border: 1px solid rgba(0, 102, 255, 0.2); }
        .balao.minha { align-self: flex-end; background: #0066ff; border: none; }
        .balao img { max-width: 100%; border-radius: 10px; margin-top: 5px; display: block; }

        .controles { display: flex; align-items: center; gap: 10px; padding: 15px; background: #111; border-top: 1px solid #222; }
        .controles input { flex: 1; background: #222; border: none; padding: 12px; border-radius: 25px; color: #fff; outline: none; }
    </style>
</head>
<body>

    <div id="tela-identidade">
        <div class="avatar-box" onclick="document.getElementById('f-perfil').click()">
            <img id="p-img" src="https://github.com/detiillimichel.png">
        </div>
        <input type="file" id="f-perfil" style="display:none" onchange="preview(this)">
        
        <input type="text" id="vibe-id" class="input-vibe" placeholder="Digite seu Nome ou URL">
        <button class="btn-acesso" onclick="iniciar()">ACESSAR VIBE</button>
    </div>

    <div id="tela-chat">
        <div id="mensagens"></div>
        <div class="controles">
            <i class="fa-solid fa-camera" style="font-size: 24px; color: #0066ff;" onclick="document.getElementById('f-chat').click()"></i>
            <input type="file" id="f-chat" style="display:none" onchange="subirFoto(this)">
            <input type="text" id="campo-msg" placeholder="Envie sua vibe...">
            <i class="fa-solid fa-paper-plane" style="font-size: 24px; color: #0066ff;" onclick="enviarT()"></i>
        </div>
    </div>

    <script>
        const config = { databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database().ref("vibe_final_estavel");

        let user = "";

        // 1. FILEREADER PARA AVATAR NA TELA INICIAL
        function preview(input) {
            if (input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { document.getElementById('p-img').src = e.target.result; };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 2. TROCA DE TELA (RESOLVE O ERRO DA URL)
        function iniciar() {
            user = document.getElementById('vibe-id').value.trim();
            if(user) {
                if(navigator.vibrate) navigator.vibrate(50);
                document.getElementById('tela-identidade').style.display = 'none';
                document.getElementById('tela-chat').style.display = 'flex';
                ligarChat();
            } else {
                alert("Por favor, preencha sua identificação.");
            }
        }

        // 3. LOGICA DO CHAT
        function ligarChat() {
            db.limitToLast(20).on("child_added", s => {
                const d = s.val();
                const b = document.createElement("div");
                b.className = "balao " + (d.u === user ? "minha" : "");
                b.innerHTML = `<b>${d.u}</b><br>${d.img ? `<img src="${d.img}">` : d.t}`;
                document.getElementById("mensagens").appendChild(b);
                document.getElementById("mensagens").scrollTop = 99999;
            });
        }

        function enviarT() {
            const m = document.getElementById("campo-msg");
            if(m.value.trim()) {
                db.push({ u: user, t: m.value });
                if(navigator.vibrate) navigator.vibrate(40);
                m.value = "";
            }
        }

        // 4. FILEREADER PARA FOTOS NO CHAT (DICA DO CODEPEN)
        function subirFoto(input) {
            if (input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    db.push({ u: user, img: e.target.result });
                    if(navigator.vibrate) navigator.vibrate(80);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        document.getElementById("campo-msg").onkeypress = e => { if(e.key === "Enter") enviarT(); };
    </script>
</body>
</html>
