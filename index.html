<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Inicialização do Supabase
        window.supabaseClient = supabase.createClient(
            'https://uqdwtzlkqaosnweyoyit.supabase.co',
            'sb_publishable_uafBQD1aJ3w8_eq4meOsNQ_wzk8TwhA'
        );
    </script>
</head>
<body style="margin:0; background:#18191a; font-family: sans-serif; overflow: hidden;">

    <div id="portal-layer" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; padding: 20px; box-sizing: border-box;">
        <h1 style="color: white; font-size: 32px; letter-spacing: 2px; margin-bottom: 40px;">OIO ONE</h1>
        <div style="width: 100%; max-width: 320px;">
            <input type="text" id="login-email" placeholder="Usuário (Michel Detilli)" style="width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #3a3b3c; background: #242526; color: white; font-size: 16px; outline: none;">
            <input type="password" id="login-pass" placeholder="Senha" style="width: 100%; padding: 16px; margin-bottom: 25px; border-radius: 12px; border: 1px solid #3a3b3c; background: #242526; color: white; font-size: 16px; outline: none;">
            <button id="btn-entrar" style="width: 100%; padding: 16px; background: #1877f2; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer;">ACESSAR UNIVERSO</button>
        </div>
        <p style="color: #b0b3b8; font-size: 12px; margin-top: 30px;">Vibe-app © 2026</p>
    </div>

    <div id="app-layer" style="display: none; height: 100vh; width: 100vw;">
        <div id="universe-display" style="height: 100%; width: 100%;"></div>
    </div>

    <script>
        const btn = document.getElementById('btn-entrar');
        const portal = document.getElementById('portal-layer');
        const app = document.getElementById('app-layer');

        // Verifica se já está logado
        if (localStorage.getItem('oio_user_email')) {
            portal.style.display = 'none';
            app.style.display = 'block';
        }

        btn.onclick = async () => {
            const login = document.getElementById('login-email').value.trim();
            const senha = document.getElementById('login-pass').value.trim();

            if (!login || !senha) {
                alert("Preencha tudo!");
                return;
            }

            btn.innerText = "VERIFICANDO...";

            try {
                // ✅ Usando .eq() para busca exata
                const { data, error } = await window.supabaseClient
                    .from('profiles')
                    .select('*')
                    .eq('email', login)
                    .eq('password', senha)
                    .maybeSingle();

                if (data) {
                    localStorage.setItem('oio_user_email', data.email);
                    location.reload();
                } else {
                    alert("Acesso negado! Nome ou senha errados.");
                    btn.innerText = "ACESSAR UNIVERSO";
                }
            } catch (err) {
                alert("Erro na conexão!");
                btn.innerText = "ACESSAR UNIVERSO";
            }
        };
    </script>
</body>
</html>
