<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Vibe App</title>
  <link rel="stylesheet" href="style.css">
  <!-- Manifest para PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
</head>
<body>
  <header>
    <h1>Vibe App</h1>
    <p>Escolha um módulo para entrar</p>
  </header>

  <main class="grid">
    <button data-bloco="home">Home</button>
    <button data-bloco="watch">Watch</button>
    <button data-bloco="friends">Friends</button>
    <button data-bloco="market">Market</button>
    <button data-bloco="alerts">Alerts</button>
    <button data-bloco="menu">Menu</button>
  </main>

  <div id="app"></div>

  <footer>© 2026 Vibe App — Michel</footer>

  <script type="module" src="./js/core.js"></script>
  <script type="module" src="./js/quantum.js"></script>

  <!-- Registro do Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log("Service Worker registrado"))
        .catch(err => console.error("Erro SW:", err));
    }
  </script>
</body>
</html>
