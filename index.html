<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vibe App</title>
    <style>
        :root { 
            --bg: #000000; --card: #121212; --text: #ffffff; 
            --muted: #a0a0a0; --accent: #0095f6; --border: #262626;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* BARRA SUPERIOR ELEGANTE */
        header {
            display: flex; justify-content: space-around; align-items: center;
            min-height: 65px; border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            padding-top: env(safe-area-inset-top); z-index: 100;
        }
        .nav-icon { width: 24px; height: 24px; fill: var(--muted); cursor: pointer; transition: 0.3s; }
        .nav-icon.active { fill: var(--text); filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)); }

        /* CONTEÚDO PRINCIPAL */
        main { flex: 1; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        .gaveta { display: none; height: 100%; width: 100%; flex-direction: column; overflow-y: auto; }
        .gaveta.ativa { display: flex; animation: slideUp 0.3s ease; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* GAVETA 3: CHAT ESTILO IPHONE */
        #chat-section { display: flex; flex-direction: column; height: 100%; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .bubble { 
            max-width: 75%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4;
            background: var(--card); border: 1px solid var(--border); align-self: flex-start;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .msg-me { align-self: flex-end; background: var(--accent); border: none; color: white; }

        .input-bar { 
            padding: 15px; background: var(--bg); border-top: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }
        .input-bar input { 
            flex: 1; background: #1c1c1c; border: 1px solid var(--border);
            padding: 12px 20px; border-radius: 25px; color: white; font-size: 16px; outline: none;
        }
        .send-btn { color: var(--accent); font-weight: 700; background: none; border: none; padding: 5px 10px; cursor: pointer; }

        /* ESTILIZAÇÃO DAS OUTRAS TELAS */
        .content-view { padding: 30px 20px; text-align: center; }
        .vibe-title { font-size: 28px; font-weight: 200; letter-spacing: 8px; margin-bottom: 10px; }
        .card-pro { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 15px; margin-top: 20px; text-align: left; }
        .video-container { width: 100%; height: 100%; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <header id="nav-bar">
        <svg class="nav-icon active" onclick="nav(0, this)" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <svg class="nav-icon" onclick="nav(1, this)" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
        <svg class="nav-icon" onclick="nav(2, this)" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
        <svg class="nav-icon" onclick="nav(3, this)" viewBox="0 0 24 24"><path d="M19 6h-2c0-2.76-2.24-5-5-5S7 3.24 7 6H5c-1.1 0-1.99.9-1.99 2L3 20c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2l-1-12c0-1.1-.9-2-2-2z"/></svg>
        <svg class="nav-icon" onclick="nav(4, this)" viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        <svg class="nav-icon" onclick="nav(5, this)" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </header>

    <main>
        <!-- TELA 1: HOME -->
        <section class="gaveta ativa content-view">
            <h1 class="vibe-title">VIBE</h1>
            <p style="color:var(--muted)">Sua experiência começa aqui.</p>
            <div class="card-pro">
                <h4 style="margin-bottom:5px">Mural de Destaques</h4>
                <p style="font-size:13px; color:var(--muted)">Confira o que há de novo na sua região hoje.</p>
            </div>
        </section>
        
        <!-- TELA 2: VÍDEOS -->
        <section class="gaveta">
            <div class="video-container">
                <video id="vid" loop playsinline onclick="this.paused?this.play():this.pause()">
                    <source src="https://www.w3schools.com/html/mov_bbb.mp4">
                </video>
            </div>
        </section>

        <!-- TELA 3: CHAT (O QUE VOCÊ PRECISA TESTAR) -->
        <section class="gaveta">
            <div id="chat-section">
                <div id="messages"></div>
                <div class="input-bar">
                    <input type="text" id="mText" placeholder="Escreva algo...">
                    <button class="send-btn" onclick="sendMsg()">ENVIAR</button>
                </div>
            </div>
        </section>

        <!-- TELA 4: SHOP -->
        <section class="gaveta content-view">
            <h2 style="font-weight:300">Marketplace</h2>
            <div class="card-pro"><p>Produtos exclusivos da comunidade.</p></div>
        </section>

        <!-- TELA 5: NOTIFICAÇÕES -->
        <section class="gaveta content-view">
            <h2 style="font-weight:300">Atividade</h2>
            <p style="margin-top:20px; color:var(--muted)">Você está atualizado.</p>
        </section>

        <!-- TELA 6: PERFIL -->
        <section class="gaveta content-view">
            <div style="width:100px; height:100px; background:var(--card); border:1px solid var(--border); border-radius:50%; margin: 0 auto 20px;"></div>
            <h2>Minha Conta</h2>
            <p style="color:var(--muted)">Membro Premium</p>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script>
        const config = {
            apiKey: "AlzaSyAWL1XRR8JK-J5Qk5DSIKmBl4ZYMZw1R4I",
            authDomain: "vibe-app-bbba2.firebaseapp.com",
            projectId: "vibe-app-bbba2",
            storageBucket: "vibe-app-bbba2.appspot.com",
        };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        function nav(idx, el) {
            document.querySelectorAll('.gaveta').forEach((g, i) => g.classList.toggle('ativa', i === idx));
            document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            const v = document.getElementById('vid');
            idx === 1 ? v.play() : v.pause();
        }

        function sendMsg() {
            const input = document.getElementById('mText');
            if(input.value.trim()){
                db.collection("mensagens").add({
                    texto: input.value,
                    origem: "usuario_a", // Altere para "usuario_b" em outro cel para ver a bolha branca
                    data: firebase.firestore.FieldValue.serverTimestamp()
                });
                input.value = "";
            }
        }

        db.collection("mensagens").orderBy("data", "asc").onSnapshot(snap => {
            const container = document.getElementById('messages');
            container.innerHTML = "";
            snap.forEach(doc => {
                const msg = doc.data();
                const isMe = msg.origem === "usuario_a";
                container.innerHTML += `<div class="bubble ${isMe ? 'msg-me' : ''}">${msg.texto}</div>`;
            });
            container.scrollTop = container.scrollHeight;
        });
    </script>
</body>
</html>
