<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="menu-principal">
    <header>
      <h1>Vibe App</h1>
      <p>Escolha um módulo para entrar</p>
    </header>
    <main class="grid">
      <button onclick="abrirModulo('home')">Home</button>
      <button onclick="abrirModulo('watch')">Watch</button>
      <button onclick="abrirModulo('friends')">Friends</button>
      <button onclick="abrirModulo('market')">Market</button>
      <button onclick="abrirModulo('alerts')">Alerts</button>
      <button onclick="abrirModulo('menu')">Menu</button>
    </main>
  </div>

  <div id="container-modulo" style="display: none;"></div>

  <script>
    async function abrirModulo(nome) {
      const menu = document.getElementById('menu-principal');
      const container = document.getElementById('container-modulo');
      
      // Mapeamento das suas pastas
      const pastas = {
        'home': 'bloco-1-home',
        'watch': 'bloco-2-watch',
        'friends': 'bloco-3-friends',
        'market': 'bloco-4-market',
        'alerts': 'bloco-5-alerts',
        'menu': 'bloco-6-menu'
      };

      try {
        const response = await fetch(`./${pastas[nome]}/index.html`);
        const html = await response.text();
        
        // A MÁGICA: Esconde o menu e mostra só o conteúdo novo
        menu.style.display = 'none';
        container.innerHTML = html;
        container.style.display = 'block';
        
        // Faz os scripts internos do módulo funcionarem
        const scripts = container.querySelectorAll("script");
        scripts.forEach(oldScript => {
          const newScript = document.createElement("script");
          newScript.text = oldScript.text;
          document.body.appendChild(newScript);
        });

      } catch (err) {
        alert("Erro ao carregar o módulo: " + nome);
      }
    }

    function voltarAoMenu() {
      document.getElementById('menu-principal').style.display = 'block';
      document.getElementById('container-modulo').style.display = 'none';
      document.getElementById('container-modulo').innerHTML = '';
    }
  </script>
</body>
</html>
