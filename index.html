<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vibe App</title>
    <link rel="stylesheet" href="styles/dna.css">
    <link rel="stylesheet" href="styles/premium.css">
</head>
<body>

<header>
    <svg class="icon active" onclick="tab(0,this)" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <svg class="icon" onclick="tab(1,this)" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
    <svg class="icon" onclick="tab(2,this)" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    <svg class="icon" onclick="tab(3,this)" viewBox="0 0 24 24"><path d="M19 6h-2c0-2.76-2.24-5-5-5S7 3.24 7 6H5c-1.1 0-1.99.9-1.99 2L3 20c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2l-1-12c0-1.1-.9-2-2-2z"/></svg>
    <svg class="icon" onclick="tab(4,this)" viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
    <svg class="icon" onclick="tab(5,this)" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
</header>

<main>
    <section class="page active centered"><h2>Feed</h2><div class="card">Acompanhe as vibrações.</div></section>
    <section class="page"><video id="vid" loop playsinline><source src="https://www.w3schools.com/html/mov_bbb.mp4"></video></section>
    <section class="page" id="chat-view"><div id="msg-container"></div><div class="input-box"><input type="text" id="txt" placeholder="Diga algo..."><button class="btn-send" onclick="send()">ENVIAR</button></div></section>
    <section class="page centered"><h2>Shop</h2><div class="card">Produtos em breve.</div></section>
    <section class="page centered"><h2>Avisos</h2><p>Sem notificações.</p></section>
    <section class="page centered"><h2>Perfil</h2><div class="card">Configurações da conta.</div></section>
</main>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
<script src="js/main.js"></script>
</body>
</html>
