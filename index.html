<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OIO ONE | CORE SYSTEM</title>
    
    <link rel="stylesheet" href="styles/dna.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --primary: #1877f2; --glass: rgba(255, 255, 255, 0.05); }
        * { margin:0; padding:0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { background:#000; height:100vh; width:100vw; overflow:hidden; font-family: sans-serif; color: #fff; }

        /* PORTAL LAYER - RESPEITANDO SEU JS */
        #portal-layer { position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center; background:#000; transition: 0.5s; }
        #portal-layer.hidden { opacity:0; pointer-events:none; }
        
        .login-card { width:90%; max-width:380px; padding:40px; background:var(--glass); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px); border-radius:35px; border:1px solid rgba(255,255,255,0.1); text-align:center; }
        .brand { font-size: 45px; font-weight: 900; letter-spacing: -3px; margin-bottom: 30px; background: linear-gradient(#fff, #1877f2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .input-oio { width:100%; height:60px; background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.1); border-radius:18px; color:#fff; padding:0 20px; margin-bottom:15px; outline:none; font-size:16px; }
        #btn-entrar { width:100%; height:60px; background:var(--primary); border:none; border-radius:18px; color:#fff; font-weight:800; font-size:16px; box-shadow: 0 10px 20px rgba(24, 119, 242, 0.3); }

        /* APP LAYER - RESPEITANDO SEU JS */
        #app-layer { display:none; flex-direction:column; height:100vh; }
        #app-layer:not(.hidden) { display:flex; }
        #app-layer.hidden { display:none; }

        header { height: 60px; background: var(--primary); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        #universe-display { flex:1; overflow-y:auto; padding: 20px; }

        /* NAV ITEM - MÓDULOS */
        nav { height: 80px; background: rgba(0,0,0,0.9); border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { color: #555; font-size: 22px; transition: 0.3s; padding: 10px; }
        .nav-item.active { color: var(--primary); transform: translateY(-5px); }
    </style>
</head>
<body>

    <div id="portal-layer">
        <div class="login-card">
            <div class="brand">OIO ONE</div>
            <input type="email" id="login-email" class="input-oio" placeholder="E-mail">
            <input type="password" id="login-pass" class="input-oio" placeholder="Senha">
            <button id="btn-entrar">ACESSAR UNIVERSO</button>
        </div>
    </div>

    <div id="app-layer" class="hidden">
        <header>
            <span style="font-weight:900; font-size:20px;">OIO ONE</span>
            <div style="width:35px; height:35px; border-radius:50%; background:#fff; overflow:hidden;">
                <img id="user-avatar" src="" style="width:100%; height:100%; object-fit:cover;">
            </div>
        </header>

        <main id="universe-display">
            </main>

        <nav>
            <div class="nav-item active"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item"><i class="fa-solid fa-play"></i></div>
            <div class="nav-item"><i class="fa-solid fa-comment"></i></div>
            <div class="nav-item"><i class="fa-solid fa-bag-shopping"></i></div>
            <div class="nav-item"><i class="fa-solid fa-bell"></i></div>
            <div class="nav-item"><i class="fa-solid fa-bars"></i></div>
        </nav>
    </div>

    <script src="js/core.js"></script>
    <script src="Core/app-init.js"></script>

</body>
</html>
