<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIBE - OIO ONE</title>
    
    <!-- Forçando o caminho relativo correto para as pastas de estilo -->
    <link rel="stylesheet" href="./css/dna.css">
    <link rel="stylesheet" href="./css/premium_clean.css">
</head>
<body class="dark-theme">

    <!-- CAMADA 0: PORTAL DE ACESSO -->
    <div id="portal-layer" class="layer-visible">
        <div class="vibe-container">
            <h1 class="vibe-logo">VIBE</h1>
            <div class="login-box">
                <input type="email" id="user-email" placeholder="ID de Acesso" class="vibe-input">
                <input type="password" id="user-pass" placeholder="Senha" class="vibe-input">
                <button id="btn-entrar" class="vibe-button">ACESSAR</button>
            </div>
        </div>
    </div>

    <!-- CAMADA 1: APP REAL (Escondido via CSS) -->
    <div id="app-layer" class="hidden">
        <header class="app-header">
            <span id="user-display-name">USUÁRIO</span>
        </header>

        <main id="universe-display"></main>

        <!-- BARRA DE NAVEGAÇÃO COM ÍCONES PROFISSIONAIS GEMINI -->
        <nav class="vibe-nav">
            <div class="nav-item active" data-universe="home"><i class="icon-home"></i></div>
            <div class="nav-item" data-universe="reels"><i class="icon-reels"></i></div>
            <div id="btn-hub" class="nav-item hub-trigger"><i class="icon-hub"></i></div>
            <div class="nav-item" data-universe="friends"><i class="icon-friends"></i></div>
            <div class="nav-item" data-universe="profile"><i class="icon-profile"></i></div>
        </nav>
    </div>

    <!-- CAMADA 2: HUB DE LUXO -->
    <div id="hub-layer" class="hub-hidden">
        <div class="hub-content">
            <button class="close-hub">FECHAR</button>
            <div class="hub-grid">
                <div class="hub-option" onclick="switchUniverse('drawing')">CANVAS</div>
                <div class="hub-option" onclick="switchUniverse('audio')">VOICE</div>
            </div>
        </div>
    </div>

    <!-- SCRIPTS - CARREGAMENTO EM MÓDULO -->
    <script type="module" src="./js/core.js"></script>
    <script type="module" src="./js/quantum.js"></script>

</body>
</html>
