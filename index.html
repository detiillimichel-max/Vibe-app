<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vibe App | OIO ONE</title>
    
    <!-- Chamando a sua Decoração -->
    <link rel="stylesheet" href="styles/dna.css">
    <link rel="stylesheet" href="styles/premium.css">
</head>
<body>

    <!-- Camada de Entrada (Portal) -->
    <div id="portal-layer">
        <div class="login-box">
            <h1 class="portal-label">VIBE</h1>
            <input type="text" id="user-id" placeholder="ID de Acesso">
            <button class="glass-btn" onclick="acessar()">ACESSAR</button>
        </div>
    </div>

    <!-- Camada do App (As 6 Janelas que você criou) -->
    <div id="app-layer" class="hidden">
        <header class="quantum-nav">
            <button class="nav-item active" onclick="tab(0,this)">FEED</button>
            <button class="nav-item" onclick="tab(1,this)">VIBE</button>
            <button class="nav-item" onclick="tab(2,this)">CHAT</button>
            <button class="nav-item" onclick="tab(3,this)">SHOP</button>
            <button class="nav-item" onclick="tab(4,this)">AVISOS</button>
            <button class="nav-item" onclick="tab(5,this)">PERFIL</button>
        </header>

        <main id="main-content">
            <!-- As janelas serão preenchidas pelos seus arquivos na pasta js/modules -->
            <section class="page active" id="feed-view">
                <div class="card-vibe">Carregando Feed Orgânico...</div>
            </section>
        </main>

        <!-- Botão do seu Hub de Luxo -->
        <div class="floating-icons">
            <button class="icon-btn" onclick="toggleHub()">HUB</button>
        </div>
    </div>

    <!-- O Cérebro que comanda as pastas js/services e js/modules -->
    <script src="js/main.js"></script>
</body>
</html>
