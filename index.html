  <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Pro - OIO ONE</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* TELA DE LOGIN (DNA OIO ONE) */
        #login-screen { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; background: radial-gradient(circle at top, #001a33, #000); position: fixed; width: 100%; z-index: 100;
        }
        .vibe-input { background: #111; border: 1px solid #0044cc; color: #fff; padding: 12px; border-radius: 25px; width: 80%; max-width: 300px; margin-bottom: 10px; text-align: center; outline: none; }
        .btn-vibe { background: #0066ff; color: #fff; border: none; padding: 12px 40px; border-radius: 25px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 80%; max-width: 300px; }

        /* TELA DE CHAT */
        #chat-screen { display: none; flex-direction: column; height: 100vh; }
        #mensagens { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .balao { padding: 12px; border-radius: 15px; max-width: 80%; background: rgba(0, 153, 255, 0.15); border: 1px solid rgba(0, 102, 255, 0.3); align-self: flex-start; }
        .balao.minha { align-self: flex-end; background: #0066ff; border: none; }
        .balao img { max-width: 100%; border-radius: 10px; margin-top: 5px; }

        .barra { display: flex; gap: 10px; padding: 15px; background: #111; align-items: center; }
        .barra input { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #222; color: #fff; outline: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color: #0099ff;">Vibe Identidade</h2>
        <input type="text" id="nome-id" class="vibe-input" placeholder="Seu Nome">
        <input type="email" id="email-id" class="vibe-input" placeholder="Email">
        <input type="password" id="senha-id" class="vibe-input" placeholder="Senha">
        <button class="btn-vibe" onclick="cadastrar()">CADASTRAR</button>
        <button class="btn-vibe" style="background:#222;" onclick="entrar()">ENTRAR</button>
        <p id="feedback" style="font-size: 12px; margin-top: 10px;"></p>
    </div>

    <div id="chat-screen">
        <div id="mensagens"></div>
        <div class="barra">
            <input type="file" id="foto-file" style="display:none" onchange="enviarFoto(this)">
            <button style="background:none; border:none; color:#0099ff; font-size:24px;" onclick="document.getElementById('foto-file').click()">📸</button>
            <input type="text" id="msg-input" placeholder="Sua vibe...">
            <button style="background:none; border:none; color:#0099ff; font-size:24px;" onclick="enviarTexto()">🚀</button>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO REAL DO SEU PROJETO vibe-app-bbba2
        const firebaseConfig = {
            apiKey: "AIzaSyAkJlFLnzPdwJUbnfJdwvQ3_YFC7A33sAQ",
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/",
            projectId: "vibe-app-bbba2",
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database().ref("mensagens_vibe_pro");

        let userNome = "";

        // LÓGICA DE LOGIN/CADASTRO
        function cadastrar() {
            userNome = document.getElementById("nome-id").value;
            auth.createUserWithEmailAndPassword(document.getElementById("email-id").value, document.getElementById("senha-id").value)
            .then(() => abrirChat())
            .catch(e => document.getElementById("feedback").innerText = e.message);
        }

        function entrar() {
            userNome = document.getElementById("nome-id").value;
            auth.signInWithEmailAndPassword(document.getElementById("email-id").value, document.getElementById("senha-id").value)
            .then(() => abrirChat())
            .catch(e => document.getElementById("feedback").innerText = e.message);
        }

        function abrirChat() {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("chat-screen").style.display = "flex";
            if(navigator.vibrate) navigator.vibrate(50);
            ouvirMensagens();
        }

        // LÓGICA DO CHAT SENSORIAL
        function ouvirMensagens() {
            db.limitToLast(20).on("child_added", snap => {
                const d = snap.val();
                const div = document.createElement("div");
                div.className = "balao " + (d.nome === userNome ? "minha" : "");
                div.innerHTML = `<b>${d.nome}</b><br>${d.img ? `<img src="${d.img}">` : d.texto}`;
                document.getElementById("mensagens").appendChild(div);
                document.getElementById("mensagens").scrollTop = 99999;
            });
        }

        function enviarTexto() {
            const input = document.getElementById("msg-input");
            if(input.value) {
                db.push({ nome: userNome, texto: input.value });
                input.value = "";
                if(navigator.vibrate) navigator.vibrate(40);
            }
        }

        // FILEREADER (O TRUQUE QUE NÃO TRAVA O FIREBASE)
        function enviarFoto(input) {
            if (input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    db.push({ nome: userNome, img: e.target.result });
                    if(navigator.vibrate) navigator.vibrate(100);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
