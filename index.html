<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vibe App - OIO ONE</title>
    <style>
        /* CSS DE LUXO - ARQUITETURA PREMIUM */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; color: #fff; overflow-x: hidden; padding-bottom: 70px; }
        
        .app-screen { display: none; min-height: 100vh; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* HEADER FIXO */
        .header { background: #121212; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .header h1 { color: #1877f2; font-size: 24px; font-weight: 800; }

        /* FEED & CARDS */
        .post-card { background: #1c1c1c; margin: 10px 0; padding: 15px; border-radius: 15px; }
        .avatar { width: 45px; height: 45px; background: #3a3a3a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* CHAT SYSTEM */
        #chat-content { height: 70vh; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 12px; border-radius: 18px; font-size: 15px; }
        .sent { background: #1877f2; align-self: flex-end; border-bottom-right-radius: 2px; }
        .received { background: #333; align-self: flex-start; border-bottom-left-radius: 2px; }

        /* NAV INFERIOR */
        nav { background: #121212; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; z-index: 1000; }
        nav button { background: none; border: none; color: #888; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        nav button.active-link { color: #1877f2; }
    </style>
</head>
<body>

    <div id="screen-home" class="app-screen active">
        <div class="header"><h1>Vibe</h1><div class="avatar">M</div></div>
        <div style="padding: 20px; text-align: center; color: #888;">
            <h2>Bem-vindo, Michel</h2>
            <p>Seu ecossistema modular está online.</p>
        </div>
        <div class="post-card"><strong>Pipoco:</strong> OIO ONE carregado com sucesso!</div>
    </div>

    <div id="screen-chat" class="app-screen">
        <div class="header"><h1>Mensagens</h1></div>
        <div id="chat-content">
            <div class="bubble received">Olá! Como está o projeto OIO ONE?</div>
        </div>
        <div style="position: fixed; bottom: 80px; width: 100%; padding: 10px; display: flex; gap: 10px;">
            <input type="text" id="chat-input" placeholder="Sua mensagem..." style="flex: 1; padding: 12px; border-radius: 25px; border: none; background: #222; color: #fff;">
            <button onclick="enviarMsg()" style="background: #1877f2; color: white; border: none; border-radius: 50%; width: 45px; height: 45px;">➔</button>
        </div>
    </div>

    <nav>
        <button onclick="navTo('home')" id="btn-home" class="active-link">🏠<span>Home</span></button>
        <button onclick="navTo('chat')" id="btn-chat">💬<span>Chat</span></button>
        <button onclick="navTo('market')">🛒<span>Market</span></button>
        <button onclick="navTo('perfil')">👤<span>Perfil</span></button>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        // CONEXÃO ÚNICA (O MOTOR)
        const supabase = supabase.createClient('SUA_URL_AQUI', 'SUA_KEY_AQUI');

        function navTo(screen) {
            // Esconde todas as telas
            document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-link'));
            
            // Mostra a selecionada
            document.getElementById('screen-' + screen).classList.add('active');
            if(document.getElementById('btn-' + screen)) {
                document.getElementById('btn-' + screen).classList.add('active-link');
            }
        }

        async function enviarMsg() {
            const input = document.getElementById('chat-input');
            if(!input.value) return;

            // Injeta na tela na hora (Design Premium)
            const chat = document.getElementById('chat-content');
            chat.innerHTML += `<div class="bubble sent">${input.value}</div>`;
            chat.scrollTop = chat.scrollHeight;
            input.value = '';
        }
    </script>
</body>
</html>
