<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vibe Premium</title>
    <style>
        :root { 
            --bg: #000000; --card: #121212; --text: #ffffff; 
            --muted: #8e8e8e; --accent: #0095f6; --border: #262626;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER PROFISSIONAL - ÍCONES ORIGINAIS */
        header {
            display: flex; justify-content: space-around; align-items: center;
            min-height: 60px; border-bottom: 1px solid var(--border); background: var(--bg);
            padding-top: env(safe-area-inset-top);
        }
        .nav-icon { width: 24px; height: 24px; fill: var(--muted); cursor: pointer; transition: 0.2s; }
        .nav-icon.active { fill: var(--text); }

        /* CONTEÚDO */
        main { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .gaveta { display: none; height: 100%; width: 100%; flex-direction: column; animation: fadeIn 0.3s ease; }
        .gaveta.ativa { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* GAVETA 3: CHAT BLINDADO (ESTILO VERCEL) */
        #chat-section { display: flex; flex-direction: column; height: 100%; justify-content: space-between; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .bubble { 
            max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4;
            background: var(--card); border: 1px solid var(--border); align-self: flex-start;
        }
        .msg-me { align-self: flex-end; background: var(--accent); border: none; }

        .input-area { 
            padding: 15px; border-top: 1px solid var(--border); background: var(--bg);
            display: flex; align-items: center; gap: 10px;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }
        .input-area input { 
            flex: 1; background: #1a1a1a; border: none; padding: 12px 20px; 
            border-radius: 25px; color: white; outline: none; font-size: 16px;
        }
        .send-btn { color: var(--accent); font-weight: 600; background: none; border: none; cursor: pointer; }

        /* VÍDEO E OUTROS */
        .video-full { width: 100%; height: 100%; object-fit: cover; }
        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .empty-state h2 { font-weight: 300; letter-spacing: 2px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <svg class="nav-icon active" onclick="nav(0, this)" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <svg class="nav-icon" onclick="nav(1, this)" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
        <svg class="nav-icon" onclick="nav(2, this)" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
        <svg class="nav-icon" onclick="nav(3, this)" viewBox="0 0 24 24"><path d="M19 6h-2c0-2.76-2.24-5-5-5S7 3.24 7 6H5c-1.1 0-1.99.9-1.99 2L3 20c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2l-1-12c0-1.1-.9-2-2-2z"/></svg>
        <svg class="nav-icon" onclick="nav(4, this)" viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        <svg class="nav-icon" onclick="nav(5, this)" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </header>

    <main>
        <!-- G1: FEED -->
        <section class="gaveta ativa"><div class="empty-state"><h2>VIBE</h2><p style="color:var(--muted)">Sua rede orgânica.</p></div></section>
        
        <!-- G2: VÍDEO -->
        <section class="gaveta">
            <video id="v" class="video-full" loop playsinline onclick="this.paused?this.play():this.pause()">
                <source src="https://www.w3schools.com/html/mov_bbb.mp4">
            </video>
        </section>

        <!-- G3: CHAT (O CORAÇÃO DO APP) -->
        <section class="gaveta">
            <div id="chat-section">
                <div id="messages"></div>
                <div class="input-area">
                    <input type="text" id="mIn" placeholder="Digite uma mensagem...">
                    <button class="send-btn" onclick="send()">Enviar</button>
                </div>
            </div>
        </section>

        <!-- G4, G5, G6: PLACEHOLDERS -->
        <section class="gaveta"><div class="empty-state"><h2>SHOP</h2><p>Marketplace em breve.</p></div></section>
        <section class="gaveta"><div class="empty-state"><h2>ALERTS</h2><p>Nenhuma novidade.</p></div></section>
        <section class="gaveta"><div class="empty-state"><h2>CONTA</h2><p>Configurações de privacidade.</p></div></section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AlzaSyAWL1XRR8JK-J5Qk5DSIKmBl4ZYMZw1R4I",
            authDomain: "vibe-app-bbba2.firebaseapp.com",
            projectId: "vibe-app-bbba2",
            storageBucket: "vibe-app-bbba2.appspot.com",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function nav(idx, el) {
            document.querySelectorAll('.gaveta').forEach((g, i) => g.classList.toggle('ativa', i === idx));
            document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            if(idx !== 1) document.getElementById('v').pause();
        }

        function send() {
            const i = document.getElementById('mIn');
            if(i.value.trim()){
                db.collection("chats").add({
                    msg: i.value,
                    user: "local",
                    ts: firebase.firestore.FieldValue.serverTimestamp()
                });
                i.value = "";
            }
        }

        db.collection("chats").orderBy("ts", "asc").onSnapshot(snap => {
            const b = document.getElementById('messages');
            b.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const me = d.user === "local";
                b.innerHTML += `<div class="bubble ${me?'msg-me':''}">${d.msg}</div>`;
            });
            b.scrollTop = b.scrollHeight;
        });
    </script>
</body>
</html>
