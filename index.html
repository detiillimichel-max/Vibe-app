<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OIO ONE</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --accent: #1877f2; --glass: rgba(255, 255, 255, 0.1); }
        * { margin:0; padding:0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { background:#000; height:100vh; width:100vw; overflow:hidden; font-family: sans-serif; color: #fff; }
        
        /* VÍDEO DE FUNDO */
        video#bg-video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; z-index: 1; filter: brightness(0.3); }
        
        /* PORTAL DE LOGIN */
        #oio-portal { position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center; background:#000; }
        .login-card { width:85%; max-width:400px; padding:40px; background:var(--glass); backdrop-filter:blur(20px); border-radius:30px; border:1px solid rgba(255,255,255,0.1); text-align:center; z-index:2; }
        
        .input-oio { width:100%; height:60px; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.1); border-radius:15px; color:#fff; padding:0 20px; margin-bottom:20px; outline:none; font-size:16px; }
        .btn-entrar { width:100%; height:60px; background:var(--accent); border:none; border-radius:15px; color:#fff; font-weight:bold; font-size:18px; }

        /* APP PRINCIPAL (ESCONDIDO NO INÍCIO) */
        #oio-os { display:none; flex-direction:column; height:100vh; position:relative; z-index:5; }
        
        nav#footer { position:fixed; bottom:0; width:100%; height:80px; background:rgba(0,0,0,0.8); display:flex; justify-content:space-around; align-items:center; border-top:1px solid rgba(255,255,255,0.1); }
        .nav-icon { font-size:24px; color:#555; }
        .nav-icon.active { color:var(--accent); }
    </style>
</head>
<body>

    <video id="bg-video" loop playsinline autoplay muted src="https://cdn.pixabay.com/vimeo/327315600/city-22634.mp4"></video>

    <div id="oio-portal">
        <div class="login-card">
            <h1 style="margin-bottom:30px; letter-spacing:-2px;">OIO ONE</h1>
            <input type="text" id="id-name" class="input-oio" placeholder="Nome do Usuário">
            <input type="password" id="id-pin" class="input-oio" placeholder="Senha (PIN)">
            <button class="btn-entrar" onclick="fazerLogin()">ENTRAR NO UNIVERSO</button>
            <p id="auth-msg" style="color:red; margin-top:15px; display:none; font-size:12px;">Preencha todos os campos!</p>
        </div>
    </div>

    <div id="oio-os">
        <header style="padding:40px 25px; display:flex; justify-content:space-between; align-items:center;">
            <h2 id="user-display">Michel</h2>
            <i class="fa-solid fa-circle-user" style="font-size:30px;"></i>
        </header>

        <div id="content" style="padding:20px; flex:1;">
            <div style="background:var(--glass); padding:30px; border-radius:20px; border:1px solid rgba(255,255,255,0.1);">
                <h3>Sistema Ativo</h3>
                <p style="opacity:0.6; margin-top:10px;">Todos os 6 módulos foram carregados.</p>
            </div>
        </div>

        <nav id="footer">
            <i class="fa-solid fa-house nav-icon active"></i>
            <i class="fa-solid fa-play nav-icon"></i>
            <i class="fa-solid fa-comment nav-icon"></i>
            <i class="fa-solid fa-bag-shopping nav-icon"></i>
            <i class="fa-solid fa-bell nav-icon"></i>
            <i class="fa-solid fa-bars nav-icon"></i>
        </nav>
    </div>

    <script>
        // Função de Login que aceita qualquer senha
        function fazerLogin() {
            const nome = document.getElementById('id-name').value.trim();
            const senha = document.getElementById('id-pin').value.trim();
            const erro = document.getElementById('auth-msg');

            // Se o usuário colocou o nome e a senha (qualquer uma de 4 dígitos ou mais)
            if (nome !== "" && senha.length >= 4) {
                // Salva o nome
                localStorage.setItem('oio_user', nome);
                document.getElementById('user-display').innerText = nome;

                // Esconde o Portal e mostra o App
                document.getElementById('oio-portal').style.display = 'none';
                document.getElementById('oio-os').style.display = 'flex';
                
                if (window.navigator.vibrate) window.navigator.vibrate(50);
            } else {
                erro.style.display = 'block';
                if (window.navigator.vibrate) window.navigator.vibrate([50, 100, 50]);
            }
        }

        // Garante que o vídeo toque no mobile
        document.addEventListener('click', () => {
            const v = document.getElementById('bg-video');
            if(v) v.play();
        }, {once: true});
    </script>
</body>
</html>
