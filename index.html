<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe App</title>
    <style>
        :root { 
            --bg-color: #000000; --card-color: #121212; --text-main: #FFFFFF; 
            --text-muted: #888888; --border-color: #222222; --accent: #007bff;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg-color); color: var(--text-main); 
            font-family: -apple-system, system-ui, sans-serif; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER - 6 ÍCONES */
        header { 
            display: flex; justify-content: space-around; align-items: center;
            min-height: 60px; border-bottom: 1px solid var(--border-color); 
            background: var(--bg-color); z-index: 10;
        }

        .icon { width: 22px; height: 22px; fill: var(--text-muted); cursor: pointer; transition: 0.2s; }
        .icon.active { fill: var(--text-main); }

        /* CONTEÚDO DINÂMICO */
        main { flex: 1; overflow-y: auto; position: relative; }
        .gaveta { display: none; height: 100%; width: 100%; animation: fadeIn 0.2s; }
        .gaveta.ativa { display: flex; flex-direction: column; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* GAVETA 2: VÍDEO FULL */
        .video-full { width: 100%; height: 100%; object-fit: cover; background: #000; }

        /* GAVETA 3: CHAT REALTIME */
        #chat-wrap { display: flex; flex-direction: column; height: 100%; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { padding: 12px 16px; border-radius: 20px; font-size: 15px; max-width: 80%; line-height: 1.4; }
        .msg-me { align-self: flex-end; background: #0056b3; color: white; border-bottom-right-radius: 4px; }
        .msg-them { align-self: flex-start; background: var(--card-color); border: 1px solid var(--border-color); border-bottom-left-radius: 4px; }

        .chat-input-bar { 
            padding: 15px; border-top: 1px solid var(--border-color); 
            display: flex; align-items: center; gap: 12px; background: var(--bg-color);
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        .chat-input-bar input { 
            flex: 1; background: #1a1a1a; border: none; padding: 12px 20px; 
            border-radius: 25px; color: white; outline: none; font-size: 16px;
        }
        .btn-send svg { fill: var(--accent); width: 24px; height: 24px; }

        /* ESTILO CARDS (OUTRAS GAVETAS) */
        .content-padding { padding: 25px; }
        .card { background: var(--card-color); border: 1px solid var(--border-color); border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        h2 { font-weight: 400; margin-bottom: 10px; letter-spacing: 1px; }
        p { color: var(--text-muted); font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <svg class="icon active" onclick="abrirGaveta('gaveta-1', this)" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <svg class="icon" onclick="abrirGaveta('gaveta-2', this)" viewBox="0 0 24 24"><path d="M10 16.5l6-4.5-6-4.5v9zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
        <svg class="icon" onclick="abrirGaveta('gaveta-3', this)" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
        <svg class="icon" onclick="abrirGaveta('gaveta-4', this)" viewBox="0 0 24 24"><path d="M19 6h-2c0-2.76-2.24-5-5-5S7 3.24 7 6H5c-1.1 0-1.99.9-1.99 2L3 20c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2l-1-12c0-1.1-.9-2-2-2z"/></svg>
        <svg class="icon" onclick="abrirGaveta('gaveta-5', this)" viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        <svg class="icon" onclick="abrirGaveta('gaveta-6', this)" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </header>

    <main>
        <!-- G1: FEED -->
        <section id="gaveta-1" class="gaveta ativa content-padding">
            <h2>Mural</h2>
            <div class="card"><p>Publicação orgânica em destaque...</p></div>
            <div class="card"><p>Novidades da rede...</p></div>
        </section>

        <!-- G2: VIBE REELS -->
        <section id="gaveta-2" class="gaveta">
            <video id="meuVideo" class="video-full" loop playsinline onclick="this.paused ? this.play() : this.pause()">
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            </video>
        </section>

        <!-- G3: CHAT FIREBASE -->
        <section id="gaveta-3" class="gaveta">
            <div id="chat-wrap">
                <div id="messages"></div>
                <div class="chat-input-bar">
                    <input type="text" id="chatInput" placeholder="Sua vibe...">
                    <button onclick="enviar()" class="btn-send">
                        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            </div>
        </section>

        <!-- G4: LOJA -->
        <section id="gaveta-4" class="gaveta content-padding">
            <h2>Marketplace</h2>
            <div class="card"><p>Produtos e serviços próximos de você.</p></div>
        </section>

        <!-- G5: ALERTAS -->
        <section id="gaveta-5" class="gaveta content-padding">
            <h2>Notificações</h2>
            <div class="card"><p>Sem notificações no momento.</p></div>
        </section>

        <!-- G6: CONTA -->
        <section id="gaveta-6" class="gaveta content-padding" style="align-items: center;">
            <div style="width: 80px; height: 80px; background: #1a1a1a; border-radius: 50%; border: 1px solid #333; margin-top: 20px;"></div>
            <h3 style="margin-top: 15px; font-weight: 400;">Configurações</h3>
            <p>Sair da conta</p>
        </section>
    </main>

    <!-- FIREBASE SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script>
        // Suas chaves extraídas da imagem
        const firebaseConfig = {
            apiKey: "AlzaSyAWL1XRR8JK-J5Qk5DSIKmBl4ZYMZw1R4I",
            authDomain: "vibe-app-bbba2.firebaseapp.com",
            projectId: "vibe-app-bbba2",
            storageBucket: "vibe-app-bbba2.appspot.com",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Navegação
        function abrirGaveta(id, el) {
            document.querySelectorAll('.gaveta').forEach(g => g.classList.remove('ativa'));
            document.querySelectorAll('.icon').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('ativa');
            el.classList.add('active');
            
            // Pausa vídeo se sair da G2
            if(id !== 'gaveta-2') document.getElementById('meuVideo').pause();
        }

        // Chat
        function enviar() {
            const input = document.getElementById('chatInput');
            if (input.value.trim()) {
                db.collection("mensagens").add({
                    texto: input.value,
                    uid: "meu_id_unico", // Identificador para a bolha azul
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                input.value = "";
            }
        }

        db.collection("mensagens").orderBy("timestamp", "asc").onSnapshot(snap => {
            const box = document.getElementById('messages');
            box.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                const isMe = m.uid === "meu_id_unico";
                box.innerHTML += `<div class="bubble ${isMe ? 'msg-me' : 'msg-them'}">${m.texto}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
