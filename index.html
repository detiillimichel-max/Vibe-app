<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE - Vibe</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #tela-inicial { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(circle at top, #001a33, #000); position: absolute; width: 100%; z-index: 10; transition: 0.5s; }
        .avatar-box { width: 130px; height: 130px; border-radius: 50%; border: 3px solid #0066ff; margin-bottom: 20px; overflow: hidden; background: #111; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        .input-identidade { background: #111; border: 1px solid #0044cc; color: #fff; padding: 15px; border-radius: 30px; width: 80%; max-width: 300px; text-align: center; margin-bottom: 20px; outline: none; }
        .btn-vibe { background: #0066ff; color: #fff; border: none; padding: 15px 50px; border-radius: 30px; font-weight: bold; cursor: pointer; }

        #tela-chat { display: none; flex-direction: column; height: 100vh; background: #000; position: relative; }
        #mensagens { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .balao { padding: 12px; border-radius: 18px; max-width: 80%; background: rgba(0, 153, 255, 0.15); align-self: flex-start; border: 1px solid rgba(0, 102, 255, 0.2); }
        .balao.minha { align-self: flex-end; background: #0066ff; border: none; }
        .balao img { max-width: 100%; border-radius: 10px; margin-top: 5px; }
        .barra { display: flex; align-items: center; gap: 10px; padding: 15px; background: #111; }
        .barra input { flex: 1; background: #222; border: none; padding: 12px; border-radius: 25px; color: #fff; outline: none; }
    </style>
</head>
<body>

    <div id="tela-inicial">
        <div class="avatar-box" onclick="document.getElementById('in-foto').click()">
            <img id="p-foto" src="https://via.placeholder.com/150">
        </div>
        <input type="file" id="in-foto" style="display:none" onchange="ler(this)">
        <input type="text" id="in-nome" class="input-identidade" placeholder="Digita Nome ou URL">
        <button class="btn-vibe" onclick="entrar()">ENTRAR NO OIO ONE</button>
    </div>

    <div id="tela-chat">
        <div id="mensagens"></div>
        <div class="barra">
            <i class="fa-solid fa-camera" style="font-size: 24px; color: #0066ff;" onclick="document.getElementById('in-chat').click()"></i>
            <input type="file" id="in-chat" style="display:none" onchange="enviarF(this)">
            <input type="text" id="m-text" placeholder="Escreva...">
            <i class="fa-solid fa-paper-plane" style="font-size: 24px; color: #0066ff;" onclick="enviarT()"></i>
        </div>
    </div>

    <script>
        const conf = { databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(conf);
        const db = firebase.database().ref("vibe_oio_final");

        let nick = "";

        function ler(i) {
            if (i.files[0]) {
                const r = new FileReader();
                r.onload = e => { document.getElementById('p-foto').src = e.target.result; };
                r.readAsDataURL(i.files[0]);
            }
        }

        function entrar() {
            nick = document.getElementById('in-nome').value.trim();
            if(nick) {
                document.getElementById('tela-inicial').style.display = 'none';
                document.getElementById('tela-chat').style.display = 'flex';
                if(navigator.vibrate) navigator.vibrate(50);
                conectar();
            } else { alert("Insira um nome!"); }
        }

        function conectar() {
            db.limitToLast(15).on("child_added", s => {
                const d = s.val();
                const div = document.createElement("div");
                div.className = "balao " + (d.u === nick ? "minha" : "");
                div.innerHTML = `<b>${d.u}</b><br>${d.img ? `<img src="${d.img}">` : d.t}`;
                document.getElementById("mensagens").appendChild(div);
                document.getElementById("mensagens").scrollTop = 9999;
            });
        }

        function enviarT() {
            const m = document.getElementById("m-text");
            if(m.value) { db.push({ u: nick, t: m.value }); m.value = ""; }
        }

        function enviarF(i) {
            if (i.files[0]) {
                const r = new FileReader();
                r.onload = e => db.push({ u: nick, img: e.target.result });
                r.readAsDataURL(i.files[0]);
            }
        }
    </script>
</body>
</html>
