<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE | PROFESSIONAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #1877f2; --bg: #000; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; height: 100%; overflow: hidden; }
        .hidden { display: none !important; }

        /* --- LOGIN PREMIUM --- */
        #portal-layer { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #111 0%, #000 100%); }
        .login-box { background: var(--glass); backdrop-filter: blur(25px); padding: 40px 30px; border-radius: 30px; border: 1px solid var(--border); width: 85%; max-width: 350px; text-align: center; }
        .oio-logo { font-size: 70px; font-weight: 900; letter-spacing: -4px; color: var(--accent); margin-bottom: 20px; }
        input { width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.08); border: 1px solid var(--border); padding: 18px; border-radius: 15px; color: white; margin-bottom: 15px; font-size: 16px; outline: none; }
        .btn-premium { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--accent); color: white; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 8px 20px rgba(24, 119, 242, 0.3); }

        /* --- ESTRUTURA DO APP --- */
        .top-nav { height: 70px; display: flex; align-items: center; justify-content: space-around; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); position: fixed; top: 0; width: 100%; z-index: 100; }
        .nav-icon { font-size: 24px; color: #555; transition: 0.3s; }
        .nav-icon.active { color: var(--accent); }
        #main-render { flex: 1; margin-top: 70px; height: calc(100vh - 70px); overflow-y: auto; padding: 20px; box-sizing: border-box; }

        /* --- CARDS & CHAT --- */
        .glass-card { background: var(--glass); border: 1px solid var(--border); border-radius: 25px; padding: 20px; margin-bottom: 20px; }
        #chat-window { height: 300px; overflow-y: auto; display: flex; flex-direction: column; margin-bottom: 15px; padding-right: 10px; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; margin-bottom: 10px; font-size: 14px; position: relative; }
        .bubble.me { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 5px; }
        .bubble.other { background: #333; align-self: flex-start; border-bottom-left-radius: 5px; }
        .bubble .sender { font-size: 10px; font-weight: bold; display: block; margin-bottom: 4px; opacity: 0.7; }
        
        /* GRID MÓDULO 6 */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-item { background: var(--glass); border: 1px solid var(--border); height: 110px; border-radius: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .grid-item i { font-size: 26px; color: var(--accent); margin-bottom: 10px; }
    </style>
</head>
<body>

    <section id="portal-layer">
        <div class="login-box">
            <div class="oio-logo">OIO</div>
            <input type="text" id="user-name" placeholder="Nome de Usuário">
            <input type="tel" id="user-pass" placeholder="Senha de 4 dígitos" maxlength="4">
            <button class="btn-premium" onclick="initApp()">DESBLOQUEAR</button>
            <p id="error-msg" class="hidden" style="color:#ff4444; margin-top:10px;">Verifique os dados.</p>
        </div>
    </section>

    <main id="app-layer" class="hidden">
        <nav class="top-nav">
            <div class="nav-icon active" onclick="router(1, this)"><i class="fas fa-home"></i></div>
            <div class="nav-icon" onclick="router(2, this)"><i class="fas fa-play-circle"></i></div>
            <div class="nav-icon" onclick="router(3, this)"><i class="fas fa-comment-alt"></i></div>
            <div class="nav-icon" onclick="router(4, this)"><i class="fas fa-shopping-bag"></i></div>
            <div class="nav-icon" onclick="router(6, this)"><i class="fas fa-bars"></i></div>
        </nav>
        <div id="main-render"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const sUrl = 'https://uqdwtzlkqaosnweyoyit.supabase.co';
        const sKey = 'sb_publishable_uafBQD1aJ3w8_eq4meOsNQ_wzk8TwhA';
        const supabase = window.supabase.createClient(sUrl, sKey);
        let myUser = "";

        function initApp() {
            const name = document.getElementById('user-name').value;
            const pass = document.getElementById('user-pass').value;
            if(name.length > 2 && pass === "2024") { // Sua senha de 4 dígitos
                myUser = name;
                document.getElementById('portal-layer').classList.add('hidden');
                document.getElementById('app-layer').classList.remove('hidden');
                router(1);
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }

        async function router(p, el) {
            if(el) { document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
            const view = document.getElementById('main-render');
            
            if(p === 1) {
                view.innerHTML = `<div class="glass-card"><h2>Bem-vindo, ${myUser}</h2><p>O Universo OIO ONE está pronto.</p></div>`;
            } 
            else if(p === 2) {
                view.innerHTML = `<div class="glass-card"><h3>Vibe Videos</h3><div id="v-feed">Carregando vídeos...</div></div>`;
                const { data } = await supabase.from('posts_video').select('*');
                if(data) document.getElementById('v-feed').innerHTML = data.map(v => `<video src="${v.url}" controls style="width:100%; border-radius:15px; margin-top:10px"></video>`).join('');
            }
            else if(p === 3) {
                view.innerHTML = `
                    <div class="glass-card">
                        <h3>Chat Global</h3>
                        <div id="chat-window"></div>
                        <div style="display:flex; gap:10px">
                            <input id="m-text" placeholder="Mensagem..." style="margin:0">
                            <button class="btn-premium" style="width:60px" onclick="send()"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>`;
                loadChat();
                setInterval(loadChat, 3000);
            }
            else if(p === 6) {
                view.innerHTML = `
                    <div class="menu-grid">
                        <div class="grid-item"><i class="fas fa-user-circle"></i>Perfil</div>
                        <div class="grid-item"><i class="fas fa-cog"></i>Ajustes</div>
                        <div class="grid-item" style="color:#ff4444" onclick="location.reload()"><i class="fas fa-power-off"></i>SAIR</div>
                    </div>`;
            }
        }

        async function loadChat() {
            const { data } = await supabase.from('mensagens').select('*').order('created_at', {ascending: true});
            const win = document.getElementById('chat-window');
            if(data && win) {
                win.innerHTML = data.map(m => `<div class="bubble ${m.usuario === myUser ? 'me' : 'other'}"><span class="sender">${m.usuario}</span>${m.texto}</div>`).join('');
                win.scrollTop = win.scrollHeight;
            }
        }

        async function send() {
            const txt = document.getElementById('m-text').value;
            if(!txt) return;
            await supabase.from('mensagens').insert([{ texto: txt, usuario: myUser }]);
            document.getElementById('m-text').value = "";
            loadChat();
        }
    </script>
</body>
</html>
