<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Pro - OIO ONE</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }
        #centro { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        .foto-perfil { width: 130px; height: 130px; border-radius: 50%; border: 3px solid #00ffcc; }
        #salto { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: rgba(255,255,255,0.1); padding: 15px 25px; border-radius: 50px; backdrop-filter: blur(15px); z-index: 1000; border: 1px solid #333; }
        .win { position: absolute; width: 94%; height: 80%; top: 5%; left: 3%; background: #0a0a0a; border-radius: 25px; display: none; flex-direction: column; border: 1px solid #333; z-index: 500; }
        #chat { flex: 1; padding: 15px; overflow-y: auto; }
        .msg-box { margin: 8px 0; padding: 10px; background: #1a1a1a; border-radius: 10px; border-left: 3px solid #00ffcc; }
        .img-chat { max-width: 100%; border-radius: 10px; margin-top: 5px; border: 1px solid #333; }
        .box { padding: 15px; display: flex; gap: 10px; background: #111; border-radius: 0 0 25px 25px; }
        input { flex: 1; background: #222; border: none; padding: 12px; border-radius: 10px; color: #fff; outline: none; }
    </style>
</head>
<body>
    <div id="centro">
        <img src="https://github.com/detiillimichel.png" class="foto-perfil">
        <h2 style="letter-spacing:2px">MICHEL</h2>
    </div>
    
    <div id="salto">
        <div onclick="abr()" style="font-size:30px">💬</div>
        <div onclick="document.getElementById('cam').click()" style="font-size:30px">📸</div>
        <input type="file" id="cam" accept="image/*" capture="camera" style="display:none" onchange="enviarFoto(this)">
        <div onclick="location.reload()" style="font-size:30px">🔄</div>
    </div>

    <div id="vibe-win" class="win">
        <div style="padding:15px; background:#111; border-radius:25px; display:flex; justify-content:space-between"><span>Vibe Chat</span><span onclick="abr()">✕</span></div>
        <div id="chat"></div>
        <div class="box"><input type="text" id="m" placeholder="Escreva..."><button onclick="env()" style="background:#00ffcc; border:none; padding:10px 15px; border-radius:10px; font-weight:bold">OK</button></div>
    </div>

    <script>
        const conf = { databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(conf);
        const db = firebase.database().ref("mensagens");

        function abr(){ const w = document.getElementById('vibe-win'); w.style.display = w.style.display === 'flex' ? 'none' : 'flex'; }
        function env(){ const t = document.getElementById('m').value; if(t){ db.push({ u: "Michel", t: t }); document.getElementById('m').value = ""; } }

        async function enviarFoto(input) {
            if (input.files[0]) {
                const formData = new FormData();
                formData.append("image", input.files[0]);
                // Usando API pública de hospedagem para não depender do Firebase Storage travado
                const res = await fetch("https://api.imgbb.com/1/upload?key=6dad88476d05988172c9596395b03737", { method: "POST", body: formData });
                const json = await res.json();
                db.push({ u: "Michel", t: "📸 Enviou uma foto", img: json.data.url });
            }
        }

        db.limitToLast(20).on("child_added", (s) => {
            const d = s.val();
            if(d.u && (d.t || d.img)) {
                const p = document.createElement("div");
                p.className = "msg-box";
                p.innerHTML = `<b>${d.u}:</b> ${d.t || ''}`;
                if(d.img) p.innerHTML += `<br><img src="${d.img}" class="img-chat">`;
                document.getElementById('chat').appendChild(p);
                document.getElementById('chat').scrollTop = 9999;
            }
        });
    </script>
</body>
</html>
