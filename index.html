<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE | Portal</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body class="bg-black">

    <div id="portal-layer">
        <div class="login-box">
            <div class="oio-logo">
                <div class="logo-ring"></div>
                <div class="logo-core"></div>
            </div>
            
            <div class="input-group">
                <input type="email" id="user-email" placeholder="Identidade (E-mail)" autocomplete="off">
                <input type="password" id="user-pass" placeholder="Código (Senha)">
            </div>

            <button id="btn-entrar" class="glass-btn">ACESSAR UNIVERSO</button>
            <p class="portal-footer">OIO ONE - SISTEMA ORGÂNICO</p>
        </div>
    </div>

    <main id="app-layer" class="hidden">
        <section class="video-container">
            <video muted loop playsinline id="main-video">
                <source src="https://archive.org/download/steamboat-willie-1928/SteamboatWillie1928.mp4" type="video/mp4">
            </video>
            <div class="video-overlay"></div>
        </section>

        <nav class="floating-icons">
            <button class="icon-btn" id="btn-hub">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/></svg>
            </button>
        </nav>
    </main>

    <div id="hub-layer" class="hub-hidden">
        <div class="hub-content">
            <h1 class="user-name">MICHEL</h1>
            <div class="vitrine-grid" id="vitrine-main"></div>
            <button class="close-hub">VOLTAR</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
