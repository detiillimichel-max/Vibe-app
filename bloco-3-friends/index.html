<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #000000;
            --card-bg: #111111;
            --accent: #1877f2;
            --text: #ffffff;
            --secondary-text: #aaaaaa;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }

        h2 { font-size: 24px; margin-bottom: 20px; }

        .friend-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .info { display: flex; align-items: center; gap: 15px; }
        
        .avatar {
            width: 50px; height: 50px;
            background: #333; border-radius: 50%;
        }

        .name { font-weight: bold; font-size: 16px; }

        .actions { display: flex; gap: 8px; }

        button {
            border: none; border-radius: 8px;
            padding: 8px 12px; font-weight: bold;
            cursor: pointer; transition: 0.2s;
        }

        .btn-add { background: var(--accent); color: white; }
        .btn-msg { background: #222; color: white; border: 1px solid #333; }
        
        /* MODAL DE MENSAGEM (Sobe de baixo) */
        #chat-modal {
            position: fixed; bottom: -100%; left: 0;
            width: 100%; height: 80%;
            background: #0a0a0a;
            border-top: 1px solid #333;
            border-radius: 20px 20px 0 0;
            transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
            display: flex; flex-direction: column;
        }

        #chat-modal.open { bottom: 0; }

        .chat-header {
            padding: 15px; border-bottom: 1px solid #222;
            display: flex; justify-content: space-between; align-items: center;
        }

        .chat-body { flex: 1; padding: 20px; overflow-y: auto; color: var(--secondary-text); }

        .chat-input {
            padding: 15px; background: #111;
            display: flex; gap: 10px;
        }

        input {
            flex: 1; background: #222; border: none;
            border-radius: 20px; padding: 10px 15px; color: white;
        }
    </style>
</head>
<body>

    <h2>Sugestões</h2>

    <div class="friend-card">
        <div class="info">
            <div class="avatar"></div>
            <span class="name">Usuário Exemplo</span>
        </div>
        <div class="actions">
            <button class="btn-msg" onclick="openChat('Usuário Exemplo')">Mensagem</button>
            <button class="btn-add">Adicionar</button>
        </div>
    </div>

    <div class="friend-card">
        <div class="info">
            <div class="avatar"></div>
            <span class="name">Novo Desenvolvedor</span>
        </div>
        <div class="actions">
            <button class="btn-msg" onclick="openChat('Novo Desenvolvedor')">Mensagem</button>
            <button class="btn-add">Adicionar</button>
        </div>
    </div>

    <div id="chat-modal">
        <div class="chat-header">
            <span id="chat-target-name" style="font-weight: bold;">Nome</span>
            <button onclick="closeChat()" style="background: none; color: var(--accent);">Fechar</button>
        </div>
        <div class="chat-body" id="chat-messages">
            Comece uma conversa segura com este usuário...
        </div>
        <div class="chat-input">
            <input type="text" placeholder="Digite uma mensagem...">
            <button class="btn-add">Enviar</button>
        </div>
    </div>

    <script>
        function openChat(name) {
            document.getElementById('chat-target-name').innerText = name;
            document.getElementById('chat-modal').classList.add('open');
        }

        function closeChat() {
            document.getElementById('chat-modal').classList.remove('open');
        }
    </script>
</body>
</html>
