<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login - Vibe App</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background: #000;
      color: #e4e6eb;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-container {
      background: #111;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(24, 119, 242, 0.5);
      width: 300px;
      text-align: center;
    }
    .login-container h1 {
      color: #1877f2;
      margin-bottom: 20px;
    }
    .login-container input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #222;
      border-radius: 8px;
      background: #000;
      color: #e4e6eb;
    }
    .login-container button {
      width: 100%;
      padding: 12px;
      background: #1877f2;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
    }
    .login-container button:hover {
      background: #0f5bb5;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Vibe App</h1>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Senha" required>
      <button type="submit"><i class="fa-solid fa-right-to-bracket"></i> Entrar</button>
    </form>
    <p style="margin-top:10px;">
      <a href="#" id="signupLink" style="color:#1877f2;">Criar conta</a>
    </p>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://uqdwtzlkqaosnweyoyit.supabase.co";
    const SUPABASE_KEY = "sb_publishable_uafBQD1aJ3w8_eq4meOsNQ_wzk8TwhA";
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        alert("Erro: " + error.message);
      } else {
        window.location.href = "/";
      }
    });

    document.getElementById('signupLink').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = prompt("Digite seu email:");
      const password = prompt("Digite sua senha:");
      if (email && password) {
        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) {
          alert("Erro: " + error.message);
        } else {
          alert("Conta criada! Verifique seu email.");
        }
      }
    });
  </script>
</body>
</html>
