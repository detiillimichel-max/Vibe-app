<section id="view-home" class="app-view active">
  
  <div class="top-bar">
    <h1>Vibe App</h1>
    <div class="top-icons">
      <button class="icon-btn"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button>
      <button class="icon-btn"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></button>
    </div>
  </div>

  <div class="post-box">
    <div class="post-box-row">
      <div class="avatar" id="user-avatar-main">M</div>
      <button class="post-input" onclick="abrirModalPost()">No que você está pensando, Michel?</button>
    </div>
    <div class="post-actions">
      <div class="post-action">
        <svg viewBox="0 0 24 24" style="fill:#f3425f"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 8l-7 4V7l7 4z"/></svg>
        Vídeo ao vivo
      </div>
      <div class="post-action">
        <svg viewBox="0 0 24 24" style="fill:#45bd62"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
        Foto/Vídeo
      </div>
      <div class="post-action">
        <svg viewBox="0 0 24 24" style="fill:#f7b928"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm4.24 16L12 15.45 7.77 18l1.12-4.81-3.73-3.23 4.92-.42L12 5l1.92 4.53 4.92.42-3.73 3.23L16.23 18z"/></svg>
        Sentimento
      </div>
    </div>
  </div>

  <div class="stories">
    <div class="story story-add">
      <div class="story-bg" style="background:#2a2a2a; height:100%;"></div>
      <div class="story-add-icon"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></div>
      <span class="story-name">Criar story</span>
    </div>
    <div id="lista-stories" style="display: flex; gap: 10px;">
       <div class="story"><div class="story-bg" style="background: linear-gradient(135deg, #1877f2, #00c6ff);"></div><div class="story-avatar"></div><span class="story-name">Maria G.</span></div>
       <div class="story"><div class="story-bg" style="background: linear-gradient(135deg, #f3425f, #ff9d00);"></div><div class="story-avatar"></div><span class="story-name">João S.</span></div>
    </div>
  </div>

  <div id="feed-dinamico">
    <div class="post">
      <div class="post-header">
        <div class="avatar" style="background:#1877f2; color:white;">P</div>
        <div class="post-info"><h4>Pipoco</h4><span>Agora mesmo · 🌐</span></div>
      </div>
      <p class="post-text">Bem-vindo ao novo OIO ONE, Michel! O feed está pronto para receber suas postagens.</p>
      <div class="post-img" style="background: url('https://via.placeholder.com/400x220') center/cover;"></div>
      <div class="post-stats"><span>👍 ❤️ 😮 1</span><span>0 comentários</span></div>
      <div class="post-btns">
        <div class="post-btn"><svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg> Curtir</div>
        <div class="post-btn"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg> Comentar</div>
      </div>
    </div>
  </div>

</section>
