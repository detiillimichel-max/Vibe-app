<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIO Menu Hub</title>

    <!-- 🎨 Puxando o DNA do seu Quarto de Design -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/dna.css"> 

    <style>
        /* Estilos vitais que usam as variáveis do seu dna.css */
        body { background-color: var(--bg-principal); color: var(--texto-claro); margin: 0; }
        .card-menu-oio { background: var(--bg-card); border: 1px solid #3a3b3c; border-radius: 12px; padding: 16px; margin: 15px; display: flex; align-items: center; gap: 15px; }
        .perfil-foto { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--oio-blue); }
    </style>
</head>
<body>

    <div id="oio-main-wrapper">
        <h2 style="padding: 15px 15px 0 15px;">Menu</h2>

        <!-- Card de Perfil -->
        <div class="card-menu-oio">
            <img src="../assets/michel.png" class="perfil-foto" id="img-user-oio" onerror="this.src='https://ui-avatars.com/api/?name=OIO'">
            <div>
                <strong id="nome-user-oio">Carregando...</strong><br>
                <small style="color: var(--oio-blue)">OIO Verified</small>
            </div>
        </div>

        <!-- Botão Salvos -->
        <div class="card-menu-oio" onclick="window.funcaoAbrirSalvos()" style="cursor:pointer">
            <i class="fas fa-bookmark" style="color: var(--oio-purple); font-size: 20px;"></i>
            <span>Itens Salvos</span>
        </div>
    </div>

    <!-- ⚙️ CONEXÃO COM A SALA DE MÁQUINAS (core.js) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/core.js"></script> 
    <script src="salvos.js"></script>

    <script>
        // O Arquiteto garante: Se o core.js carregou, o 'supabase' está pronto.
        async function vincularDinamismo() {
            // Espera o motor do core.js estar disponível
            if (typeof supabase !== 'undefined') {
                const { data: { session } } = await supabase.auth.getSession();
                if (session) {
                    const { data: perfil } = await supabase.from('profiles').select('name, avatar_url').eq('id', session.user.id).single();
                    if (perfil) {
                        document.getElementById('nome-user-oio').innerText = perfil.name;
                        if (perfil.avatar_url) document.getElementById('img-user-oio').src = perfil.avatar_url;
                    }
                }
            } else {
                document.getElementById('nome-user-oio').innerText = "Erro de Motor";
            }
        }
        vincularDinamismo();
    </script>
</body>
</html>
