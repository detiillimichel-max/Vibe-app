<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIO Menu Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/dna.css">
    <style>
        body { background-color: var(--bg-principal, #18191a); color: var(--texto-claro, #e4e6eb); margin: 0; font-family: sans-serif; }
        #menu-hub-container { padding: 16px; padding-bottom: 80px; }
        .card-menu-oio { background: var(--bg-card, #242526); border: 1px solid #3a3b3c; border-radius: 12px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .perfil-foto { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--oio-blue, #1877f2); object-fit: cover; }
        .grid-atalhos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

<div id="menu-hub-container">
    <h2 style="margin-bottom: 20px;">Menu</h2>

    <div class="card-menu-oio">
        <img class="perfil-foto" id="img-user-oio"
            src="https://ui-avatars.com/api/?name=OIO"
            onerror="this.src='https://ui-avatars.com/api/?name=OIO'">
        <div>
            <strong id="nome-user-oio">Carregando...</strong><br>
            <small style="color: var(--oio-blue, #1877f2)">OIO Verified</small>
        </div>
    </div>

    <div class="grid-atalhos">
        <div class="card-menu-oio" onclick="window.funcaoAbrirSalvos?.()" style="flex-direction: column; align-items: flex-start;">
            <i class="fas fa-bookmark" style="color: #9333ea;"></i>
            <span>Salvos</span>
        </div>
        <div class="card-menu-oio" style="flex-direction: column; align-items: flex-start;">
            <i class="fas fa-history" style="color: #1877f2;"></i>
            <span>Recordações</span>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/core.js"></script>
<script src="./salvos.js"></script>

<script>
    // ✅ AUTO-CURA — limpa lixo do localStorage
    function limparSeInvalido(chave) {
        const val = localStorage.getItem(chave);
        if (!val || val === 'undefined' || val === 'null' || val === '') {
            localStorage.removeItem(chave);
            return null;
        }
        return val;
    }

    const cacheNome = limparSeInvalido('oio_user_name');
    const cacheFoto = limparSeInvalido('oio_user_avatar');
    const cacheEmail = limparSeInvalido('oio_user_email');

    if (cacheNome) document.getElementById('nome-user-oio').innerText = cacheNome;
    if (cacheFoto) document.getElementById('img-user-oio').src = cacheFoto;

    // ✅ Busca pelo email (não usa Supabase Auth)
    function esperarMotor(tentativas = 10) {
        if (typeof window.supabase !== 'undefined') {
            buscarPerfil();
        } else if (tentativas > 0) {
            setTimeout(() => esperarMotor(tentativas - 1), 300);
        }
    }

    async function buscarPerfil() {
        try {
            if (!cacheEmail) return;

            const { data: perfil } = await window.supabase
                .from('profiles')
                .select('username, avatar_url')
                .eq('email', cacheEmail)
                .single();

            if (perfil && perfil.username) {
                document.getElementById('nome-user-oio').innerText = perfil.username;
                localStorage.setItem('oio_user_name', perfil.username);

                if (perfil.avatar_url) {
                    document.getElementById('img-user-oio').src = perfil.avatar_url;
                    localStorage.setItem('oio_user_avatar', perfil.avatar_url);
                }
            }
        } catch (err) {
            console.warn('OIO Menu: erro ao buscar perfil', err);
        }
    }

    esperarMotor();
</script>

</body>
</html>
